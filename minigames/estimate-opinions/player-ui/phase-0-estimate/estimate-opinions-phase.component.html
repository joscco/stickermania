<section class="flex h-full w-full flex-col overflow-hidden bg-white p-6 text-center items-center justify-center">
    <header class="shrink-0">
        <p class="text-[10px] font-black uppercase leading-none tracking-[0.18em] text-neutral-400">
            Meinungscheck
        </p>
    </header>

    <main class="flex min-h-0 flex-1 flex-col gap-4 pt-4">
        <section class="flex h-20 shrink-0 items-center justify-center overflow-hidden px-2">
            <h2 class="text-[1.7rem] font-black leading-[1.08] text-neutral-950">
                {{ state().variantData.question }}
            </h2>
        </section>

        <section class="grid h-[90px] shrink-0 grid-cols-2 gap-4">
            <button
                    type="button"
                    class="h-full rounded-xl border-2 px-4 text-3xl font-black leading-tight transition-all duration-300 ease-out active:scale-[0.98]"
                    [class.border-neutral-950]="draft().choseOptionA === true"
                    [class.bg-neutral-950]="draft().choseOptionA === true"
                    [class.text-white]="draft().choseOptionA === true"
                    [class.border-neutral-200]="draft().choseOptionA !== true"
                    [class.bg-white]="draft().choseOptionA !== true"
                    [class.text-neutral-950]="draft().choseOptionA !== true"
                    (click)="chooseOption(true)"
            >
                {{ state().variantData.optionA }}
            </button>

            <button
                    type="button"
                    class="h-full rounded-xl border-2 px-4 text-3xl font-black leading-tight transition-all duration-300 ease-out active:scale-[0.98]"
                    [class.border-neutral-950]="draft().choseOptionA === false"
                    [class.bg-neutral-950]="draft().choseOptionA === false"
                    [class.text-white]="draft().choseOptionA === false"
                    [class.border-neutral-200]="draft().choseOptionA !== false"
                    [class.bg-white]="draft().choseOptionA !== false"
                    [class.text-neutral-950]="draft().choseOptionA !== false"
                    (click)="chooseOption(false)"
            >
                {{ state().variantData.optionB }}
            </button>
        </section>

        <section class="w-full min-h-0 shrink-0">
            <div class="flex flex-col font-black leading-tight items-center justify-center rounded-2xl bg-neutral-100 p-2 pb-3 text-left">
                <p class="text-sm text-black">
                    Wie viel % denken wie du?
                </p>

                <p class="text-xs text-neutral-500">
                    Die beste Schätzung gewinnt.
                </p>

                <div class="w-full mt-2 px-2">
                    <sm-big-percentage-slider
                            [value]="draft().estimatedPercentageWithSameOpinion"
                            (valueChange)="setEstimatedPercentageWithSameOpinion($event)"
                    />
                </div>
            </div>
        </section>
    </main>
</section>
