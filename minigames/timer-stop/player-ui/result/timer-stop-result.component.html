<section
  class="flex h-full w-full flex-col items-center justify-center gap-5 bg-white p-8 text-center"
  *ngIf="state().ownResult as result"
>
  <h2 class="text-4xl font-black leading-none text-neutral-950">Platz {{ result.placement }}</h2>

  <dl class="grid w-full gap-2 text-sm">
    <div class="flex items-center justify-between rounded-lg bg-neutral-100 px-4 py-3">
      <dt class="text-neutral-500">Gestoppt bei</dt>
      <dd class="font-bold tabular-nums">{{ result.stoppedAtSeconds | number: "1.2-2" }} s</dd>
    </div>
    <div class="flex items-center justify-between rounded-lg bg-neutral-100 px-4 py-3">
      <dt class="text-neutral-500">Ziel</dt>
      <dd class="font-bold tabular-nums">{{ result.targetSeconds | number: "1.2-2" }} s</dd>
    </div>
    <div class="flex items-center justify-between rounded-lg bg-yellow-100 px-4 py-3">
      <dt class="text-yellow-900">Abweichung</dt>
      <dd class="font-bold tabular-nums text-yellow-950">{{ result.deviationSeconds | number: "1.2-2" }} s</dd>
    </div>
  </dl>

  <button
    class="h-16 w-full rounded-xl bg-neutral-950 px-5 text-2xl font-bold text-white active:bg-neutral-700"
    type="button"
    (click)="ready()"
  >
    Weiter
  </button>
</section>
