<section class="flex h-full w-full flex-col overflow-hidden bg-white p-8 text-center">
    <header class="shrink-0">
        <p class="text-[10px] font-black uppercase leading-none tracking-[0.18em] text-neutral-400">
            Timergefuehl
        </p>

        <p class="mt-2 text-sm font-black leading-tight text-neutral-500">
            Kleinste Abweichung gewinnt
        </p>
    </header>

    <main class="flex min-h-0 flex-1 flex-col items-center justify-center gap-12">
        <section class="grid gap-2">
            <p class="text-xs font-black uppercase tracking-wide text-neutral-400">
                Stoppe bei
            </p>

            <p class="text-5xl font-black leading-none tabular-nums text-neutral-950">
                {{ state().variantData.targetSeconds | number: "1.2-2" }}
            </p>

            <p class="text-3xl font-black leading-none text-neutral-500">
                Sekunden
            </p>
        </section>

        @if (!hasStarted()) {
            <button
                    type="button"
                    class="w-80 rounded-[2rem] bg-neutral-950 px-8 py-5 text-5xl font-black leading-none text-white shadow-sm transition active:scale-[0.98] active:bg-neutral-800"
                    (click)="startTimer()"
            >
                Start
            </button>
        }

        @if (hasStarted() && !hasStopped()) {
            <section class="grid gap-8">
                <div class="mx-auto flex h-20 w-20 items-center justify-center rounded-full bg-neutral-950 shadow-sm">
                    <span class="text-3xl font-black leading-none text-white">...</span>
                </div>

                <p class="text-xl font-black leading-tight text-neutral-500">
                    Jetzt im Kopf zaehlen.
                </p>

                <button
                        type="button"
                        class="w-80 rounded-[2rem] bg-neutral-950 px-8 py-5 text-5xl font-black leading-none text-white shadow-sm transition active:scale-[0.98] active:bg-neutral-800"
                        (click)="stopTimer()"
                >
                    Stopp
                </button>
            </section>
        }

        @if (hasStopped()) {
            <section class="rounded-[2rem] bg-neutral-100 px-10 py-7">
                <p class="text-xs font-black uppercase tracking-wide text-neutral-500">
                    Gestoppt bei
                </p>

                <p class="mt-2 text-6xl font-black leading-none tabular-nums text-neutral-950">
                    {{ elapsedSeconds() | number: "1.2-2" }} s
                </p>
            </section>
        }
    </main>
</section>
