<section class="flex h-full w-full flex-col items-center justify-center gap-2 bg-white p-8 text-center">
  <h2 class="text-[12px] font-bold text-neutral-900">{{ state().variantData.title }}</h2>

  <p class="text-xs leading-none text-neutral-500">
    Ziel: {{ state().variantData.targetSeconds | number: "1.0-2" }} Sekunden
  </p>

  <div class="flex h-16 w-full items-center justify-center">
    <div class="relative flex h-16 w-16 items-center justify-center">
      @if (hasStarted() && !hasStopped()) {
        <span class="absolute h-16 w-16 animate-ping rounded-full bg-yellow-300 opacity-40"></span>
        <span class="absolute h-10 w-10 animate-pulse rounded-full bg-yellow-400"></span>
      }
      <span
        class="relative h-6 w-6 rounded-full"
        [class.bg-neutral-300]="!hasStarted() || hasStopped()"
        [class.bg-neutral-950]="hasStarted() && !hasStopped()"
      ></span>
    </div>
  </div>

  <button
    class="h-16 w-full rounded-xl bg-neutral-950 px-5 text-2xl font-bold text-white active:bg-neutral-700 disabled:opacity-40"
    type="button"
    *ngIf="!hasStarted()"
    (click)="startTimer()"
  >
    Start
  </button>

  <button
    class="h-16 w-full rounded-xl bg-yellow-400 px-5 text-2xl font-bold text-neutral-950 active:bg-yellow-300 disabled:opacity-40"
    type="button"
    *ngIf="hasStarted() && !hasStopped()"
    (click)="stopTimer()"
  >
    Stopp
  </button>

  <p class="rounded-full bg-emerald-100 px-4 py-2 text-sm font-bold leading-none text-emerald-800" *ngIf="hasStopped()">
    Gestoppt
  </p>
</section>
