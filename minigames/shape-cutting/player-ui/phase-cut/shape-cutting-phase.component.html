<section class="flex h-full w-full flex-col overflow-hidden bg-white p-4">
  <header class="grid shrink-0 gap-1 text-center">
    <p class="text-[10px] font-black uppercase leading-none tracking-[0.18em] text-neutral-400">
      Shape Cutting
    </p>
    <h2 class="text-2xl font-black leading-tight text-neutral-950">
      {{ state().variantData.targetParts }} gleich grosse Teile
    </h2>
  </header>

  <main class="min-h-0 flex-1 pt-3">
    <div class="h-full w-full overflow-hidden rounded-lg bg-neutral-100">
      <svg
        #svg
        viewBox="0 0 360 480"
        class="block h-full w-full touch-none"
        (pointermove)="onPointerMove($event)"
        (pointerup)="onPointerUp()"
        (pointercancel)="onPointerUp()"
      >
        @if (backgroundHref(); as href) {
          <use
            [attr.href]="href"
            x="28"
            y="62"
            width="304"
            height="360"
            opacity="0.2"
            style="pointer-events: none"
          />
        }

        @for (piece of pieces(); track $index; let pieceIndex = $index) {
          <path
            [attr.d]="pointsToPath(piece.polygon)"
            [attr.fill]="pieceFill(pieceIndex)"
            fill-opacity="0.42"
            stroke="none"
          />
        }

        <polygon
          [attr.points]="polygonPoints()"
          fill="rgba(255,255,255,0.18)"
          stroke="#111827"
          stroke-width="3"
          stroke-linejoin="round"
        />

        @for (line of lines(); track $index; let lineIndex = $index) {
          <line
            [attr.x1]="line.a.x"
            [attr.y1]="line.a.y"
            [attr.x2]="line.b.x"
            [attr.y2]="line.b.y"
            stroke="#111827"
            stroke-width="4"
            stroke-linecap="round"
          />
          <circle
            [attr.cx]="line.a.x"
            [attr.cy]="line.a.y"
            r="13"
            fill="#ffffff"
            stroke="#111827"
            stroke-width="4"
            class="cursor-grab active:cursor-grabbing"
            (pointerdown)="onHandleDown(lineIndex, 'a', $event)"
          />
          <circle
            [attr.cx]="line.b.x"
            [attr.cy]="line.b.y"
            r="13"
            fill="#ffffff"
            stroke="#111827"
            stroke-width="4"
            class="cursor-grab active:cursor-grabbing"
            (pointerdown)="onHandleDown(lineIndex, 'b', $event)"
          />
        }
      </svg>
    </div>
  </main>

  <footer class="grid h-16 shrink-0 grid-cols-2 items-center gap-3 pt-3 text-center">
    <div class="rounded-lg bg-neutral-100 px-3 py-2">
      <p class="text-[10px] font-black uppercase text-neutral-500">Ziel je Teil</p>
      <p class="text-lg font-black tabular-nums text-neutral-950">{{ targetPercent() }}%</p>
    </div>
    <div class="min-w-0 rounded-lg bg-neutral-100 px-3 py-2">
      <p class="text-[10px] font-black uppercase text-neutral-500">Aktuell</p>
      <p class="truncate text-lg font-black tabular-nums text-neutral-950">{{ pieceSummary() }}</p>
    </div>
  </footer>
</section>
