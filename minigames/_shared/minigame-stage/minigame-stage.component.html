<div
  #frame
  class="bg-white"
  style="position: relative; width: 100%; aspect-ratio: 1 / 1; overflow: hidden;"
>
  <div
    style="position: absolute; left: 0; top: 0; overflow: hidden; transform-origin: 0 0;"
    [style.width.px]="stageSize()"
    [style.height.px]="stageSize()"
    [style.transform]="transform()"
  >
    <ng-content />
  </div>
</div>
