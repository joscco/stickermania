<div
        class="relative h-24 cursor-pointer select-none touch-none"
        role="slider"
        tabindex="0"
        aria-valuemin="0"
        aria-valuemax="100"
        [attr.aria-valuenow]="percentage()"
        (pointerdown)="beginDrag($event, track)"
        (pointermove)="continueDrag($event, track)"
        (pointerup)="endDrag($event)"
        (pointercancel)="endDrag($event)"
        (keydown)="changeWithKeyboard($event)"
>
    <div
        #track
        class="absolute left-4 right-4 top-[4.25rem] h-7 overflow-hidden rounded-full bg-white shadow-inner ring-1 ring-black/10"
    >
        <div
                class="h-full rounded-full bg-neutral-950"
                [style.width.%]="percentage()"
        ></div>
    </div>

    <!-- Bubble -->
    <div class="pointer-events-none absolute left-4 right-4 top-0">
        <div
                class="absolute z-10 -translate-x-1/2"
                [style.left]="handleLeft()"
        >
            <div class="relative rounded-2xl bg-neutral-950 w-20 py-2 flex items-center justify-center text-lg font-black leading-none tabular-nums text-white shadow-md">
                {{ percentage() }}%

                <div class="absolute left-1/2 top-full h-0 w-0 -translate-x-1/2 border-l-[9px] border-r-[9px] border-t-[9px] border-l-transparent border-r-transparent border-t-neutral-950"></div>
            </div>
        </div>
    </div>

    <!-- Handle -->
    <div class="pointer-events-none absolute left-4 right-4 top-[3.35rem]">
        <div
                class="absolute z-20 h-16 w-16 -translate-x-1/2 rounded-full border-[6px] border-white bg-neutral-950 shadow-md"
                [style.left]="handleLeft()"
        ></div>
    </div>
</div>

<div class="mt-2 flex justify-between px-4 text-xs font-black text-neutral-400">
    <span>0%</span>
    <span>50%</span>
    <span>100%</span>
</div>
