<div class="flex flex-col h-full"
     [class.ring-2]="isWinner()" [class.ring-yellow-400]="isWinner()"
     [class.border-yellow-400]="isWinner()" [class.border-neutral-200]="!isWinner()">
  <div class="flex items-center gap-1.5 px-3 py-2 border-b shrink-0"
       [class.bg-yellow-50]="isWinner()" [class.border-neutral-100]="!isWinner()" [class.border-yellow-300]="isWinner()">
    @if (isWinner()) { <span>★</span> }
    <span class="text-sm font-semibold truncate flex-1">{{ playerName() }}</span>
    @if (placement(); as p) { <span class="text-xs text-neutral-400 font-medium">#{{ p }}</span> }
  </div>
  <div class="flex-1 flex items-center justify-center p-3 min-h-0">
    <svg viewBox="0 0 200 200" class="w-full h-full">
      <rect width="200" height="200" fill="#f5f5f5"/>
      @for (pt of task().polygon; track $index; let i = $index) {
        @if (i < task().polygon.length - 1) {
          <line [attr.x1]="pt.x" [attr.y1]="pt.y"
                [attr.x2]="task().polygon[i + 1].x" [attr.y2]="task().polygon[i + 1].y"
                stroke="#999" stroke-width="1" stroke-dasharray="4"/>
        }
      }
      <line [attr.x1]="submission().cutLine.a.x" [attr.y1]="submission().cutLine.a.y"
            [attr.x2]="submission().cutLine.b.x" [attr.y2]="submission().cutLine.b.y"
            stroke="black" stroke-width="2.5"/>
      <text x="100" y="190" text-anchor="middle" font-size="28" font-family="sans-serif" font-weight="bold" fill="black">
        {{ (submission().areaFraction * 100).toFixed(0) }}:{{ (100 - submission().areaFraction * 100).toFixed(0) }}
      </text>
    </svg>
  </div>
  <div class="px-3 py-2 border-t border-neutral-100 shrink-0 text-center text-xs text-neutral-500">
    Ziel: {{ (task().targetFraction * 100).toFixed(0) }}:{{ (100 - task().targetFraction * 100).toFixed(0) }}
  </div>
</div>
