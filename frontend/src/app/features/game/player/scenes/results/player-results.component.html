<div class="flex-1 flex flex-col overflow-y-auto">
  <app-round-info
    [roundIndex]="0"
    title="Ergebnisse"
    [task]="currentTask()"
  />

  @if (myPlacement(); as placement) {
    <div animOnInit="medal" [animDelay]="0.15" class="flex flex-col items-center justify-center gap-3 py-4">
      <div class="grid h-24 w-24 place-items-center rounded-full bg-yellow-400 text-4xl font-black text-neutral-950 shadow-lg">
        {{ placement }}.
      </div>

      @if (currentTask(); as task) {
        <div class="text-xs text-neutral-400 text-center px-4">
          {{ taskResultLabel(task) }}
        </div>
      }

      @if (resultSummary()) {
        <div class="text-sm text-neutral-700 text-center px-4 py-2 bg-neutral-50 rounded-xl mx-4">{{ resultSummary() }}</div>
      }

      @if (isWinner()) {
        <div class="text-lg font-bold text-neutral-800 mt-2">🎉 Du hast gewonnen!</div>
      } @else if (isTiedWinner()) {
        <div class="text-lg font-bold text-neutral-800 mt-2">🤝 Geteilter 1. Platz!</div>
      }
    </div>
  } @else {
    <app-player-status-screen
      icon=""
      title="Du hast diese Runde nicht teilgenommen."
      titleClass="text-neutral-400 text-sm"
    />
  }
</div>

<div class="flex w-full shrink-0 items-center justify-center p-4 overflow-hidden">
  <button
    class="w-full max-w-lg bg-black text-white py-2.5 rounded-xl font-semibold shadow-lg active:scale-95 transition-transform"
    (click)="readyToAdvance.emit()"
  >Weiter</button>
</div>
