<div animGroup="opacity" class="flex h-full flex-col items-center justify-center gap-4 p-4">
  @if (task(); as t) {
    <div class="w-full" [style.max-width]="stageContainerMaxWidth">
      @if (minigameDefinition(); as definition) {
        @if (minigameState(); as state) {
          @if (minigamePhaseComponent(); as phaseComponent) {
            <sm-minigame-stage
              class="block w-full overflow-hidden border border-neutral-200 bg-white shadow-sm"
            >
              <sm-minigame-component-host
                class="block h-full w-full"
                [componentType]="phaseComponent"
                [state]="state"
                (playerEvent)="onMinigameEvent($event)"
              />
            </sm-minigame-stage>
          }
        }
      } @else {
        <div
          class="grid w-full place-items-center rounded-lg border border-neutral-200 bg-white p-6 text-center text-sm text-neutral-500"
          [style.aspect-ratio]="stageAspectRatio"
        >
          Dieses Minigame ist in der neuen Struktur noch nicht vorbereitet.
        </div>
      }
    </div>

    <div class="grid w-full grid-cols-2 gap-3" [style.max-width]="stageContainerMaxWidth">
      <button
        type="button"
        class="min-h-12 rounded-lg bg-neutral-200 px-4 py-3 text-base font-bold text-neutral-900 active:bg-neutral-300"
        (click)="skipRound.emit()"
      >
        Aussetzen
      </button>
      <button
        type="button"
        class="min-h-12 rounded-lg bg-neutral-950 px-4 py-3 text-base font-bold text-white active:bg-neutral-700 disabled:opacity-40"
        [disabled]="!canSubmit()"
        (click)="submitCurrentTask()"
      >
        Submit
      </button>
    </div>
  } @else {
    <div class="flex-1 flex items-center justify-center text-neutral-400 text-sm">
      Kein Minigame konfiguriert
    </div>
  }
</div>
