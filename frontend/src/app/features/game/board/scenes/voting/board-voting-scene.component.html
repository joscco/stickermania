<div class="h-full flex flex-col">
  <app-round-info
    [roundIndex]="gameState()?.currentRoundIndex ?? 0"
    [title]="gameState()?.currentPrompt ?? ''"
    [task]="$any(gameState())?.currentTask ?? null"
  />

  <!-- Slideshow strip -->
  <div #strip animOnInit="strip" [animDelay]="0.2" class="flex-1 flex items-center overflow-hidden mt-4">

    @if (needsScroll()) {
      <!-- Scrolling mode: too many cards to fit → infinite marquee -->
      <div class="flex gap-6 animate-scroll-left px-4"
           [style.animation-duration]="scrollDuration()">
        @for (sub of doubledSubmissions(); track $index) {
          <ng-container *ngTemplateOutlet="card; context: { sub: sub }"/>
        }
      </div>
    } @else {
      <!-- Static mode: all cards fit → centred, no animation -->
      <div class="flex gap-6 justify-center px-4 w-full">
        @for (sub of submissions(); track sub.id) {
          <ng-container *ngTemplateOutlet="card; context: { sub: sub }"/>
        }
      </div>
    }

  </div>

  <!-- End voting button -->
  <div animOnInit="opacity" [animDelay]="0.4" class="text-center pb-6 flex flex-col items-center gap-2">
    <p class="text-sm text-neutral-400">{{ doneVotingCount() }}/{{ roundParticipantCount() }} fertig abgestimmt</p>
    <button
      class="bg-black text-white px-8 py-3 rounded-xl text-lg font-semibold shadow-lg hover:bg-neutral-800 active:scale-95 transition-[background-color,box-shadow]"
      (click)="endVotingEarly.emit()"
    >
      Abstimmung beenden
    </button>
  </div>
</div>

<!-- Card template -->
<ng-template #card let-sub="sub">
  <div class="shrink-0 w-64 flex flex-col items-center gap-2">
    <div class="w-64 h-64 rounded-2xl overflow-hidden bg-white shadow-md border border-black/6">
      @if (sub.snapshotUrl) {
        <img [src]="sub.snapshotUrl" alt="Einsendung"
             class="w-full h-full object-contain" draggable="false" />
      } @else {
        <div class="w-full h-full grid place-items-center text-neutral-200">
          <app-svg name="icon-camera-lg" w="70" color="black"/>
        </div>
      }
    </div>
  </div>
</ng-template>
