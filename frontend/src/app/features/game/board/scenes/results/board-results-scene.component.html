<div class="h-full flex flex-col items-center justify-center">
  <app-round-info
    [roundIndex]="gameState()?.currentRoundIndex ?? 0"
    title="Ergebnisse"
    [task]="$any(gameState())?.currentTask ?? null"
    class="w-full shrink-0"
  />

  <!-- Podium: scales proportionally to fit available height -->
  <div #podiumArea animOnInit="opacity" [animDelay]="0.3" class="w-full h-full min-h-0 overflow-hidden relative">
    <div class="absolute bottom-0 left-0 right-0 flex items-end justify-center gap-3 sm:gap-5 px-2 sm:px-4 pt-2"
         [style.transform]="'scale(' + podiumScale() + ')'"
         style="transform-origin: bottom center">
      @for (slot of podiumSlots(); track slot.placement) {
        <div class="flex flex-col items-center justify-end">
          <!-- Avatar -->
          <div class="mb-1 shrink-0 relative">
            <app-board-player-avatar
              [player]="getPlayer(slot.result.playerId)!"
              [status]="'podium'"
            />
            @if (slot.placement === 1) {
              <app-svg name="crown" w="60" color="black" class="absolute -top-9 left-1/2 -translate-x-1/2"/>
            }
          </div>
          <!-- Snapshot image – only for drawing tasks -->
          @if (isDrawingTask()) {
            <div class="relative rounded-2xl border-4 bg-neutral-100 shrink-0 aspect-square"
                 [ngClass]="[slot.imgSizeClass, slot.borderClass, slot.shadowClass]">
              @if (getSnapshotUrl(slot.result.playerId); as url) {
                <img [src]="url" alt="" class="w-full h-full object-contain" draggable="false"/>
              } @else {
                <div class="w-full h-full grid place-items-center text-neutral-300">
                  <app-svg name="icon-camera-lg" [w]="slot.camW" color="black"/>
                </div>
              }
              <div class="absolute translate-x-1/2 -translate-y-1/2 top-1 right-0">
                <app-svg [name]="slot.medalIcon" [w]="slot.medalW"/>
              </div>
            </div>
          } @else {
            <!-- Non-drawing task: show medal above the podium bar -->
            <div class="shrink-0 flex items-center justify-center h-8">
              <app-svg [name]="slot.medalIcon" [w]="slot.medalW"/>
            </div>
          }
          <!-- Podium step bar -->
          <div class="w-20 sm:w-28 md:w-30 shrink-0" [ngClass]="[slot.barColorClass + ' ' + slot.barHeightClass]"></div>
          <!-- Vote stars -->
          <app-stars-display [count]="slot.result.voteCount" [starSize]="slot.starSize" [colorClass]="slot.starColor" class="shrink-0"/>
        </div>
      }
    </div>
  </div>

  <!-- Advance button -->
  <div animOnInit="opacity" [animDelay]="0.85" class="shrink-0 text-center pb-4 flex flex-col items-center gap-2">
    <p class="text-sm text-neutral-400">{{ readyToAdvanceCount() }}/{{ gameState()?.roundParticipantIds?.length ?? 0 }} bereit</p>
    <button
      class="bg-black text-white px-8 py-3 rounded-xl text-lg font-semibold shadow-lg hover:bg-neutral-800 active:scale-95 transition-all"
      (click)="advanceFromResults.emit()"
    >
      Nächste Runde
    </button>
  </div>
</div>
