<div
  class="relative select-none overflow-hidden rounded-2xl"
  style="touch-action: none;"
  [style.width.px]="sceneWidthPx() * viewScale()"
  [style.height.px]="sceneHeightPx() * viewScale()"
>
  <!-- White background -->
  <div class="absolute inset-0 bg-white"></div>

  <!-- Drawings layer -->
  @for (drawing of drawingsSorted(); track drawing.id) {
    <img
      class="absolute pointer-events-none"
      [style.left.%]="drawing.x * 100"
      [style.top.%]="drawing.y * 100"
      [style.width.px]="drawing.size * sceneWidthPx() * viewScale()"
      [style.height.px]="drawing.size * sceneWidthPx() * viewScale()"
      [style.transform]="'translate(-50%, -50%)'"
      [src]="drawing.imageDataUrl"
      [alt]="drawing.prompt"
      draggable="false"
    />
  }

  <!-- Dotted gray border overlay ON TOP of drawings -->
  <div class="absolute inset-0 pointer-events-none rounded-2xl"
    style="border: 4px dotted #dedede; z-index: 10;"></div>
</div>
