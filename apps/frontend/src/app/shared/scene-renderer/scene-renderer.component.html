<div
  class="relative select-none overflow-hidden rounded-full touch-none transition-[width,height] duration-700 ease-out"
  [style.width.px]="containerSizePx()"
  [style.height.px]="containerSizePx()"
>
  <!-- Drawings layer -->
  @for (drawing of drawingsSorted(); track drawing.id) {
    <img
      class="absolute pointer-events-none transition-all duration-700 ease-out"
      [style.left.%]="drawing.x * 100"
      [style.top.%]="drawing.y * 100"
      [style.width.px]="drawing.size * containerSizePx() * drawingScale()"
      [style.height.px]="drawing.size * containerSizePx() * drawingScale()"
      [style.transform]="'translate(-50%, -50%)'"
      [src]="drawing.imageDataUrl"
      [alt]="drawing.prompt"
      draggable="false"
    />
  }

  <!-- Circular border overlay ON TOP of drawings -->
  <div class="absolute inset-0 pointer-events-none rounded-full border-4 border-dotted border-neutral-200 z-10">
  </div>
</div>
