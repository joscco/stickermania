<div
  class="relative select-none"
  [style.width.px]="sceneWidthPx * viewScale"
  [style.height.px]="sceneHeightPx * viewScale"
>
  <div class="absolute inset-0 rounded-2xl border border-white/10 bg-white/5"></div>

  @for (placement of placementsSorted(); track placement.id) {
    <div
      class="absolute grid place-items-center rounded-xl border border-white/10 bg-black/25"
      [style.width.px]="baseStickerSizePx * viewScale"
      [style.height.px]="baseStickerSizePx * viewScale"
      [style.fontSize.px]="baseFontSizePx * viewScale"
      [style.left.%]="placement.x * 100"
      [style.top.%]="placement.y * 100"
      [style.zIndex]="placement.zIndex"
      [style.transform]="'translate(-50%, -50%) rotate(' + placement.rotationDeg + 'deg) scale(' + placement.scale + ')'"
      [style.transformOrigin]="'center'"
    >
      {{ emojiForType(placement.type) }}
    </div>
  }
</div>
