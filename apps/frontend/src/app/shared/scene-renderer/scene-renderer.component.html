<div
  class="relative select-none overflow-hidden"
  style="touch-action: none; border-radius: 50%;"
  [style.width.px]="sceneSizePx() * viewScale()"
  [style.height.px]="sceneSizePx() * viewScale()"
>
  <!-- Subtle radial gradient background -->
  <div class="absolute inset-0" style="background: radial-gradient(circle, #ffffff 0%, #f5f5f4 70%, #e7e5e4 100%);"></div>

  <!-- Drawings layer -->
  @for (drawing of drawingsSorted(); track drawing.id) {
    <img
      class="absolute pointer-events-none"
      [style.left.%]="drawing.x * 100"
      [style.top.%]="drawing.y * 100"
      [style.width.px]="drawing.size * sceneSizePx() * viewScale()"
      [style.height.px]="drawing.size * sceneSizePx() * viewScale()"
      [style.transform]="'translate(-50%, -50%)'"
      [src]="drawing.imageDataUrl"
      [alt]="drawing.prompt"
      draggable="false"
    />
  }

  <!-- Circular border overlay ON TOP of drawings -->
  <div class="absolute inset-0 pointer-events-none"
    style="border: 3px solid #d6d3d1; border-radius: 50%; z-index: 10;"></div>
</div>
