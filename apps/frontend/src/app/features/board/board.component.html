<div class="min-h-screen bg-slate-950 text-slate-100">
  <div class="mx-auto w-full max-w-6xl px-4 py-4">
    <div class="rounded-2xl border border-white/10 bg-white/5 shadow-[0_12px_30px_rgba(0,0,0,0.35)]">
      <div class="flex items-center justify-between gap-3 px-4 py-3">
        <div class="flex items-center gap-2 text-sm text-slate-300">
          <span class="text-base font-semibold text-slate-100">Board</span>
          <span class="rounded-full border border-white/15 bg-black/20 px-3 py-1 text-xs">Beamer view</span>
        </div>
        <div class="rounded-full border border-white/15 bg-black/20 px-3 py-1 text-xs text-slate-300">
          <span>{{ store.connectionStatus() }}</span>
          @if (store.revision() !== null) {
            <span>· rev {{ store.revision() }}</span>
          }
          @if (store.lastError()) {
            <span>· {{ store.lastError() }}</span>
          }
        </div>
      </div>
    </div>
    <div class="mt-3 rounded-2xl border border-white/10 bg-white/5 p-4 shadow-[0_12px_30px_rgba(0,0,0,0.35)]">
      <div class="grid select-none gap-1" [style.gridTemplateColumns]="gridTemplateColumns()">
        @for (cell of cells(); track cell.x) {
          <div class="grid h-11 w-11 place-items-center rounded-lg border border-white/10 bg-black/20 text-xl"
            [class.bg-white/5]="cell.emoji !== ''"
            [class.border-white/15]="cell.emoji !== ''">
            {{ cell.emoji }}
          </div>
        }
      </div>
      @if (!store.world()) {
        <div class="mt-3 text-xs text-slate-400">
          Waiting for world…
        </div>
      }
    </div>
  </div>
</div>
