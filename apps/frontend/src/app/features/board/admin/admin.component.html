@if (visible) {
  <div class="fixed inset-0 z-50 grid place-items-center bg-black/50 backdrop-blur-sm">
    <div class="w-[min(420px,92vw)] rounded-2xl border border-white/10 bg-slate-900/80 p-4 shadow-[0_12px_30px_rgba(0,0,0,0.6)]">
      <div class="text-sm font-semibold text-slate-100">Admin</div>
      <div class="mt-1 text-xs text-slate-300">Master-Passwort eingeben (nur auf dem Board-Gerät nötig).</div>

      <input
        class="mt-3 w-full rounded-xl border border-white/10 bg-black/30 px-3 py-2 text-sm text-slate-100 outline-none focus:border-cyan-300/50"
        type="password"
        placeholder="Passwort"
        [value]="adminKeyInput()"
        (input)="adminKeyInput.set(($any($event.target).value ?? ''))"
        (keydown.enter)="submit()"
      />

      @if (errorText) {
        <div class="mt-2 text-xs text-rose-300">{{ errorText }}</div>
      }

      <div class="mt-3 flex justify-end gap-2">
        <button
          class="rounded-xl border border-white/15 bg-white/5 px-4 py-2 text-sm hover:bg-white/10 active:translate-y-px"
          (click)="submit()"
        >
          Speichern
        </button>
      </div>

      <div class="mt-3 text-[11px] text-slate-400">
        Tipp: Wird im Browser gespeichert (localStorage).
      </div>
    </div>
  </div>
}
