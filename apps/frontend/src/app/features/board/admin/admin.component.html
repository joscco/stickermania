@if (visible()) {
  <div class="fixed inset-0 z-50 grid place-items-center bg-black/20 backdrop-blur-sm">
    <div class="w-[min(420px,92vw)] rounded-2xl border border-black/[0.06] bg-white p-4 shadow-xl">
      <div class="text-sm font-semibold text-stone-900">Admin</div>
      <div class="mt-1 text-xs text-stone-500">Master-Passwort eingeben (nur auf dem Board-Gerät nötig).</div>

      <input
        class="mt-3 w-full rounded-xl border border-black/[0.06] bg-stone-50 px-3 py-2 text-sm text-stone-900 outline-none focus:border-stone-400"
        type="password"
        placeholder="Passwort"
        [value]="adminKeyInput()"
        (input)="adminKeyInput.set(($any($event.target).value ?? ''))"
        (keydown.enter)="submit()"
      />

      @if (errorText()) {
        <div class="mt-2 text-xs text-red-500">{{ errorText() }}</div>
      }

      <div class="mt-3 flex justify-end gap-2">
        <button
          class="rounded-xl bg-stone-900 text-white px-4 py-2 text-sm hover:bg-stone-800 active:translate-y-px"
          (click)="submit()"
        >
          Speichern
        </button>
      </div>

      <div class="mt-3 text-[11px] text-stone-400">
        Tipp: Wird im Browser gespeichert (localStorage).
      </div>
    </div>
  </div>
}
