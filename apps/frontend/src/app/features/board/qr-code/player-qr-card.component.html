<div class="group relative">
  <!-- QR popover -->
  <div
    class="absolute bottom-0 right-0 w-45 rounded-2xl border border-white/10 bg-black/40 p-3 shadow-[0_12px_30px_rgba(0,0,0,0.5)] backdrop-blur"
  >
    <p>Spielt mit:</p>
    <div class="mt-2 grid place-items-center">
      @if (playerQrDataUrl) {
        <img
          [src]="playerQrDataUrl!"
          alt="Player QR Code"
          class="h-40 w-40 rounded-xl bg-white p-2"
        />
      } @else {
        <div class="text-xs text-slate-400">QR wird geladen…</div>
      }
    </div>
    <div
      class="mt-2 break-all rounded-lg border border-white/10 bg-black/30 px-2 py-1 text-[10px] text-slate-200">
      {{ playerUrl }}
    </div>
    @if (copyHint) {
      <div class="rounded-xl border border-white/10 bg-black/40 px-3 py-2 text-xs text-slate-200 backdrop-blur mt-2">
        {{ copyHint }}
      </div>
    }
  </div>
</div>
