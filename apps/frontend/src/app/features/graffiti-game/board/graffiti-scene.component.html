<div class="h-full flex flex-col overflow-hidden">
  @if (!modeState()) {
    <div class="text-sm text-stone-400 text-center py-12">Verbinde...</div>
  } @else {
    <!-- Score bar -->
    <div class="flex items-center justify-between px-6 py-3 bg-white/80 backdrop-blur border-b border-black/6 shrink-0">
      <div class="flex items-center gap-3">
        <span class="text-xl">♦️</span>
        <span class="text-lg font-bold text-blue-600">{{ diamondScore() }}</span>
        <span class="text-xs text-stone-400">({{ diamondHouseCount() }})</span>
      </div>
      <div class="flex items-center gap-2">
        @if (timeLeft()) {
          <span class="text-sm font-mono text-stone-600 bg-stone-100 px-3 py-1 rounded-lg">{{ timeLeft() }}</span>
        }
      </div>
      <div class="flex items-center gap-3">
        <span class="text-xs text-stone-400">({{ heartHouseCount() }})</span>
        <span class="text-lg font-bold text-rose-600">{{ heartScore() }}</span>
        <span class="text-xl">♥️</span>
      </div>
    </div>

    <!-- City scene (scaled to fit the board viewport completely) -->
    <div class="flex-1 relative overflow-hidden" #boardViewport>
      <div class="absolute inset-0 flex items-center justify-center overflow-hidden">
        <div class="relative"
             [style.width.px]="sceneWidth()"
             [style.height.px]="sceneHeight()"
             [style.transform]="'scale(' + fitScale() + ')'"
             style="transform-origin: center center; flex-shrink: 0;">
          <!-- Houses -->
          @for (house of houses(); track house.id) {
            <div class="absolute"
                 [style.left.px]="house.x"
                 [style.top.px]="house.y"
                 style="transform: translate(-50%, -100%);">
              <app-tag-house [house]="house" />
            </div>
          }
        </div>
      </div>
    </div>
  }
</div>
