<div class="text-center">
  <div class="text-sm text-neutral-600 mb-1">Deine Antwort (bleibt in Runde 1 geheim)</div>
  @if (voteQuestion()) {
    <div class="text-xs text-neutral-400 mb-3">Abstimmungsfrage: {{ voteQuestion() }}</div>
  }
</div>

<div class="w-full max-w-md">
  <input type="text"
    [(ngModel)]="answer"
    class="w-full text-lg text-center border-2 border-neutral-200 rounded-xl px-4 py-3 focus:border-black focus:outline-none transition-colors"
    placeholder="Deine Antwort eingeben..."
    (keyup.enter)="submit()"
  />
</div>

<button (click)="submit()" [disabled]="!answer().trim()"
  class="bg-black text-white py-2.5 px-6 rounded-xl font-semibold shadow active:scale-95 transition-transform disabled:opacity-40">
  Absenden
</button>
