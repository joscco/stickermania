<div class="text-7xl font-bold tabular-nums text-neutral-900">{{ value() }}</div>

<div class="flex items-center justify-center gap-2">
  <button (click)="decrement()" class="w-10 h-10 shrink-0 rounded-full bg-white text-neutral-700 font-bold active:scale-95">−</button>
  <input
    type="range"
    [min]="min()"
    [max]="max()"
    [value]="value()"
    (input)="onSlider($event)"
    class="w-full max-w-sm h-2 bg-white rounded-md appearance-none cursor-pointer accent-black"
  />
  <button (click)="increment()" class="w-10 h-10 shrink-0 rounded-full bg-white text-neutral-700 font-bold active:scale-95">+</button>

</div>


<button (click)="submit()" class="bg-black text-white py-2.5 px-6 rounded-xl font-semibold shadow active:scale-95 transition-transform">Bestätigen</button>
