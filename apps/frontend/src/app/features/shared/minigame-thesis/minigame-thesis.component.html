<div class="text-center w-full max-w-xs">
  @if (title()) {
    <div class="text-lg font-bold text-neutral-800 mb-4">{{ title() }}</div>
  }
  <div class="text-xs text-neutral-400 mb-1">Wofür entscheidest du dich?</div>
  <div class="flex gap-3 mb-4">
    <button (click)="pickA()"
      [class]="'flex-1 py-3 rounded-xl font-semibold text-sm transition-all active:scale-95 border-2 ' + (agreed() === true ? 'bg-green-500 border-green-600 text-white' : 'bg-white border-neutral-200 text-neutral-700')">
      {{ optionA() }}
    </button>
    <button (click)="pickB()"
      [class]="'flex-1 py-3 rounded-xl font-semibold text-sm transition-all active:scale-95 border-2 ' + (agreed() === false ? 'bg-red-500 border-red-600 text-white' : 'bg-white border-neutral-200 text-neutral-700')">
      {{ optionB() }}
    </button>
  </div>
</div>

@if (myChoice()) {
  <div class="w-full max-w-xs space-y-2">
    <div class="text-center text-xs text-neutral-500">
      Was schätzt du: Wie viel % der Leute wählen <span class="font-semibold">{{ myChoice() }}</span>?
    </div>
    <div class="flex items-center gap-3">
      <span class="text-xs font-mono text-neutral-400 w-8 text-right">0%</span>
      <input type="range" min="0" max="100" [value]="estimatedPercent()"
        (input)="estimatedPercent.set(+($any($event.target).value))"
        class="flex-1 h-2 bg-neutral-200 rounded-lg appearance-none cursor-pointer accent-black" />
      <span class="text-sm font-mono font-bold w-10">{{ estimatedPercent() }}%</span>
    </div>
  </div>
}
