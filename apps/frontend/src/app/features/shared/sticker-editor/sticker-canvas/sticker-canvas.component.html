<!-- ── Canvas area ── -->
<div
  animOnInit="opacity"
  #canvasArea
  class="w-full h-full relative overflow-visible bg-white"
>
  <!-- Editor frame background (faint) -->
  <div class="absolute inset-0 pointer-events-none" style="background-image: url('assets/svg/editor-frame.svg'); background-size: 100% 100%; opacity: 0.2;"></div>

  <!-- Floating toolbar: sticker count + clear all -->
  <div
    class="absolute top-[3%] left-[3%] flex items-center gap-1.5 px-2 py-1 bg-white/80 backdrop-blur-sm rounded-md shadow-sm z-30">
    <span class="text-xs select-none transition-colors"
          [class.text-red-400]="!canAddMore()"
          [class.text-stone-400]="canAddMore()"
    >{{ committedCount() }}/{{ maxStickers() }}</span>
    <button
      class="disabled:opacity-30 flex items-center justify-center"
      title="Alle Sticker entfernen"
      [disabled]="committedCount() <= 0"
      (click)="clearAll.emit()"
    >
      <app-svg name="icon-editor-clear-all-sm" w="20"/>
    </button>
  </div>

  <!-- Delete-zone overlay (animated via GSAP) -->
  <div [animPresence]="stickerWouldBeDeleted()"
       [animPresenceType]="'opacity'"
       data-delete-zone
       class="absolute inset-0 pointer-events-none flex items-center justify-center"
       style="z-index: 9999; opacity: 0; visibility: hidden;">
    <div class="absolute inset-0"
         style="background: repeating-linear-gradient(-45deg, oklch(85.2% 0.199 91.936 / 0.2) 0px, oklch(85.2% 0.199 91.936 / 0.2) 8px, transparent 8px, transparent 16px);"></div>
    <div data-delete-badge
         class="relative flex flex-col items-center gap-1.5 text-white rounded-2xl px-5 py-3 shadow-xl"
         style="background: oklch(85.2% 0.199 91.936); backdrop-filter: blur(4px);">
      <app-svg name="icon-trash-md" w="40" color="black"/>
      <span class="text-xs font-semibold tracking-wide">Loslassen zum Löschen</span>
    </div>
  </div>

  <!-- Stickers: p.x/p.y = visual center.
       transform-origin:0 0 pins the pivot at (p.x, p.y).
       translate(-50%,-50%) shifts the element left so its own center sits on the pivot.
       CSS applies transforms left→right, so translate happens first, then rotate, then scale —
       all around the same pivot point (p.x, p.y).
       The inner .sticker-anim-wrap handles entry/exit CSS keyframe animations
       so they don't conflict with the outer inline transform. -->
  @for (sticker of stickers(); track sticker.instanceId) {
    <div
      class="absolute select-none w-max origin-top-left"
      [style.left.px]="sticker.x"
      [style.top.px]="sticker.y"
      [style.transform]="getStickerTransform(sticker)"
      [style.z-index]="sticker.zIndex"
      [attr.data-instance-id]="sticker.instanceId"
    >
      <app-sticker-item
        [instanceId]="sticker.instanceId"
        [imageUrl]="getStickerUrl(sticker.stickerId)"
        [width]="getStickerWidth(sticker.stickerId)"
        [height]="stickerSizePx()"
        [hitboxPoints]="isSelected(sticker.instanceId) ? getHitboxSvgPoints(sticker.stickerId) : ''"
        [lassoSelected]="isLassoSelected(sticker.instanceId)"
        [animState]="getStickerAnimState(sticker.instanceId)"
        (removed)="onStickerAnimRemoved(sticker.instanceId)"
        (animDone)="clearAnimState(sticker.instanceId)"
      />
    </div>
  }

  <!-- Freehand lasso -->
  @if (lassoPath() && lassoPath()!.length > 1) {
    <svg class="absolute inset-0 w-full h-full pointer-events-none" style="z-index:8900;overflow:visible;">
      <polyline
        [attr.points]="lassoPoints()"
        fill="none"
        stroke="oklch(85.2% 0.199 91.936)"
        stroke-width="2.5"
        stroke-dasharray="5"
        stroke-linejoin="round"
        stroke-linecap="round"
      />
    </svg>
  }

  <!-- Selection overlay (handles + menu toggle) — hidden in delete zone -->
  <div #selectionOverlayWrap data-canvas-overlay
       [animPresence]="overlayVisible()" [animPresenceType]="'opacity'"
       class="pointer-events-none"
       style="position:absolute;inset:0;z-index:9000;">
    @if (selectionInfo(); as si) {
      <app-sticker-selection-overlay
        [box]="si.box"
        [padding]="0"
        [rotation]="si.rotation"
        [stretchModeVisible]="stretchMode()"
        [isDragging]="isMoveActive()"
        [isMenuOpen]="menuVisible()"
        (handleDrag)="onHandleDrag($event)"
        (menuToggle)="onMenuToggle()"
      />
    }
  </div>

  <!-- Context menu -->
  <div [animPresence]="menuVisible() && !stickerWouldBeDeleted()"
       class="pointer-events-none absolute inset-0 z-9400" >
    <app-sticker-context-menu
      [visible]="menuVisible()"
      [anchorX]="menuAnchorX()"
      [anchorY]="menuAnchorY()"
      [canvasW]="canvasW()"
      [canvasH]="canvasH()"
      [isMulti]="isMultiSelection()"
      [canGroup]="canGroup()"
      [canUngroup]="canUngroup()"
      [canDuplicate]="canDuplicate()"
      [stretchMode]="stretchMode()"
      (action)="onContextMenuAction($event)"
    />
  </div>

  <div [animPresence]="committedCount() === 0 && canvasW() > 250"
       [animPresenceType]="'opacity'"
       class="absolute inset-0 flex items-center justify-center text-stone-300 pointer-events-none">
    <div class="text-center">
      <div class="mb-2">
        <app-svg name="icon-drag-pan-md" w="40" color="#ccc"/>
      </div>
      <p class="text-sm">Sticker unten festhalten<br/>und auf die Fläche ziehen</p>
    </div>
  </div>
</div>
