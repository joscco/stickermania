<!-- ── Canvas area ── -->
<div
  animOnInit="opacity"
  #canvasArea
  class="w-full h-full relative overflow-visible"
>
  <!-- SVG filter: yellow outline around alpha channel -->
  <svg width="0" height="0" class="absolute">
    <filter id="yellow-outline">
      <feMorphology in="SourceAlpha" operator="dilate" radius="3" result="expanded"/>
      <feFlood flood-color="#eab308" result="color"/>
      <feComposite in="color" in2="expanded" operator="in" result="outline"/>
      <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </svg>

  <!-- Editor frame background (faint) -->
  <div class="absolute inset-0 pointer-events-none"
       style="background-image: url('assets/svg/editor-frame.svg'); background-size: 100% 100%;"></div>

  <div class="absolute inset-0 pointer-events-none flex items-center justify-center z-[9999] opacity-0 invisible transition-all"
    [class.visible]="stickerWouldBeDeleted()"
    [class.opacity-100]="stickerWouldBeDeleted()"
  >
    <div class="absolute inset-0"
         style="background: repeating-linear-gradient(-45deg, oklch(85.2% 0.199 91.936 / 0.2) 0px, oklch(85.2% 0.199 91.936 / 0.2) 8px, transparent 8px, transparent 16px);"></div>
    <div data-delete-badge
         class="relative flex flex-col items-center gap-1.5 text-white rounded-2xl px-5 py-3 shadow-xl bg-[oklch(85.2%_0.199_91.936)] backdrop-blur-sm">
      <app-svg name="icon-trash-md" w="40" color="black"/>
      <span class="text-xs font-semibold tracking-wide">Loslassen zum Löschen</span>
    </div>
  </div>


  <!-- Stickers: p.x/p.y = visual center.
       transform-origin:0 0 pins the pivot at (p.x, p.y).
       translate(-50%,-50%) shifts the element left so its own center sits on the pivot.
       CSS applies transforms left→right, so translate happens first, then rotate, then scale —
       all around the same pivot point (p.x, p.y).
       The inner .sticker-anim-wrap handles entry/exit CSS keyframe animations
       so they don't conflict with the outer inline transform. -->
  @for (sticker of stickersOnCanvas(); track sticker.instanceId) {
    <div
      class="absolute select-none w-max origin-top-left"
      [style.left.px]="stickerLeft(sticker)"
      [style.top.px]="stickerTop(sticker)"
      [style.transform]="getStickerTransform(sticker)"
      [style.transform-origin]="getStickerAnchor(sticker)"
      [style.z-index]="sticker.zIndex"
      [attr.data-instance-id]="sticker.instanceId"
      [class.yellow-outline]="isSelected(sticker.instanceId) || isLassoSelected(sticker.instanceId)"
    >
      <app-sticker-item
        [instanceId]="sticker.instanceId"
        [imageUrl]="getStickerUrl(sticker.stickerId)"
        [width]="getStickerWidth(sticker.stickerId)"
        [height]="stickerSizePx()"
        [lassoSelected]="isLassoSelected(sticker.instanceId)"
        [animState]="getStickerAnimState(sticker.instanceId)"
        (removed)="onStickerAnimRemoved(sticker.instanceId)"
        (animDone)="clearAnimState(sticker.instanceId)"
      />
    </div>
  }

  <div [animPresence]="committedCount() === 0 && canvasW() > 250"
       [animPresenceType]="'opacity'"
       class="absolute inset-0 flex items-center justify-center text-neutral-300 pointer-events-none">
    <div class="text-center">
      <p class="text-sm">Tippe auf + um Sticker hinzuzufügen</p>
    </div>
  </div>
</div>
