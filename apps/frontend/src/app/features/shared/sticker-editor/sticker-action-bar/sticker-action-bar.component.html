@if (visible() && box()) {
  <div
    #bar
    class="absolute flex items-center gap-0.5 bg-white rounded-xl shadow border border-black/8 px-1 py-1 select-none z-[9500]"
    [style.left.px]="clampedX()"
    [style.top.px]="clampedY()"
    (pointerdown)="$event.stopPropagation()"
  >
    <button class="flex items-center justify-center w-9 h-9 rounded-[10px] text-red-500 transition-colors duration-150 cursor-pointer shrink-0 hover:bg-red-50 active:bg-red-100 active:scale-95" title="Löschen" (pointerdown)="onAction('delete', $event)">
      <app-svg name="icon-ctx-delete-sm" w="18"/>
    </button>

    <div class="w-px h-5 bg-neutral-200 shrink-0"></div>

    <button class="flex items-center justify-center w-9 h-9 rounded-[10px] text-neutral-600 transition-colors duration-150 cursor-pointer shrink-0 hover:bg-neutral-100 active:bg-neutral-200 active:scale-95 disabled:text-neutral-300 disabled:cursor-default" title="Duplizieren"
            [disabled]="!canDuplicate()"
            (pointerdown)="canDuplicate() && onAction('duplicate', $event)">
      <app-svg name="icon-ctx-duplicate-sm" w="18"/>
    </button>
    <button class="flex items-center justify-center w-9 h-9 rounded-[10px] text-neutral-600 transition-colors duration-150 cursor-pointer shrink-0 hover:bg-neutral-100 active:bg-neutral-200 active:scale-95" title="Spiegeln" (pointerdown)="onAction('flipH', $event)">
      <app-svg name="icon-ctx-flip-h-sm" w="18"/>
    </button>

    @if (!isMulti()) {
      <button class="flex items-center justify-center w-9 h-9 rounded-[10px] text-neutral-600 transition-colors duration-150 cursor-pointer shrink-0 hover:bg-neutral-100 active:bg-neutral-200 active:scale-95" title="Zurücksetzen" (pointerdown)="onAction('reset', $event)">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-5 h-5">
          <path d="M1 4v6h6"/>
          <path d="M3.5 20A9 9 0 1 0 2 12.5"/>
          <polyline points="7 4 1 4 1 10"/>
        </svg>
      </button>
    }

    <div class="w-px h-5 bg-neutral-200 shrink-0"></div>

    <button class="flex items-center justify-center w-9 h-9 rounded-[10px] text-neutral-600 transition-colors duration-150 cursor-pointer shrink-0 hover:bg-neutral-100 active:bg-neutral-200 active:scale-95" title="Ganz nach vorne" (pointerdown)="onAction('zFront', $event)">
      <app-svg name="icon-ctx-z-front-sm" w="18"/>
    </button>
    <button class="flex items-center justify-center w-9 h-9 rounded-[10px] text-neutral-600 transition-colors duration-150 cursor-pointer shrink-0 hover:bg-neutral-100 active:bg-neutral-200 active:scale-95" title="Eine Ebene vor" (pointerdown)="onAction('zForward', $event)">
      <app-svg name="icon-ctx-z-forward-sm" w="18"/>
    </button>
    <button class="flex items-center justify-center w-9 h-9 rounded-[10px] text-neutral-600 transition-colors duration-150 cursor-pointer shrink-0 hover:bg-neutral-100 active:bg-neutral-200 active:scale-95" title="Eine Ebene zurück" (pointerdown)="onAction('zBackward', $event)">
      <app-svg name="icon-ctx-z-backward-sm" w="18"/>
    </button>
    <button class="flex items-center justify-center w-9 h-9 rounded-[10px] text-neutral-600 transition-colors duration-150 cursor-pointer shrink-0 hover:bg-neutral-100 active:bg-neutral-200 active:scale-95" title="Ganz nach hinten" (pointerdown)="onAction('zBack', $event)">
      <app-svg name="icon-ctx-z-back-sm" w="18"/>
    </button>

    @if (canGroup() || canUngroup()) {
      <div class="w-px h-5 bg-neutral-200 shrink-0"></div>
      @if (canGroup()) {
        <button class="flex items-center justify-center w-9 h-9 rounded-[10px] text-neutral-600 transition-colors duration-150 cursor-pointer shrink-0 hover:bg-neutral-100 active:bg-neutral-200 active:scale-95" title="Gruppieren" (pointerdown)="onAction('group', $event)">
          <app-svg name="icon-ctx-group-sm" w="18"/>
        </button>
      }
      @if (canUngroup()) {
        <button class="flex items-center justify-center w-9 h-9 rounded-[10px] text-neutral-600 transition-colors duration-150 cursor-pointer shrink-0 hover:bg-neutral-100 active:bg-neutral-200 active:scale-95" title="Gruppierung aufheben" (pointerdown)="onAction('ungroup', $event)">
          <app-svg name="icon-ctx-ungroup-sm" w="18"/>
        </button>
      }
    }
  </div>
}
