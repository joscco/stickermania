@if (visible() && box(); as b) {
  <div class="absolute pointer-events-none"
       [style.left.px]="b.x + b.w / 2" [style.top.px]="b.y + b.h / 2"
       [style.transform]="'rotate(' + rotation() + 'deg)'">

    <div class="absolute pointer-events-none"
         [style.left.px]="-b.w / 2" [style.top.px]="-b.h / 2"
         [style.width.px]="b.w" [style.height.px]="b.h">

    <svg class="absolute inset-0 w-full h-full pointer-events-none overflow-visible"
         xmlns="http://www.w3.org/2000/svg">
      <rect x="0" y="0" [attr.width]="b.w" [attr.height]="b.h"
            fill="none" stroke="#e5a100" stroke-width="2" stroke-dasharray="6 3" rx="4"/>
    </svg>

    <button class="absolute -bottom-4 -left-4 w-8 h-8 rounded-full bg-white border-2 border-amber-500 flex items-center justify-center shadow pointer-events-auto active:scale-90"
            (pointerdown)="onHandleDown($event, 'rotate')">
      <app-svg name="icon-overlay-rotate-md" w="20"/>
    </button>
    <button class="absolute -bottom-4 -right-4 w-8 h-8 rounded-full bg-white border-2 border-amber-500 flex items-center justify-center shadow pointer-events-auto active:scale-90"
            (pointerdown)="onHandleDown($event, 'scale')">
      <app-svg name="icon-overlay-scale-md" w="20"/>
    </button>

    <button class="absolute -top-3 left-1/2 -translate-x-1/2 w-5 h-5 rounded-full bg-white border-2 border-amber-400 flex items-center justify-center shadow pointer-events-auto active:scale-90"
            (pointerdown)="onHandleDown($event, 'n')"><div class="w-2.5 h-2.5 rounded-sm bg-amber-400"></div></button>
    <button class="absolute -bottom-3 left-1/2 -translate-x-1/2 w-5 h-5 rounded-full bg-white border-2 border-amber-400 flex items-center justify-center shadow pointer-events-auto active:scale-90"
            (pointerdown)="onHandleDown($event, 's')"><div class="w-2.5 h-2.5 rounded-sm bg-amber-400"></div></button>
    <button class="absolute top-1/2 -translate-y-1/2 -right-3 w-5 h-5 rounded-full bg-white border-2 border-amber-400 flex items-center justify-center shadow pointer-events-auto active:scale-90"
            (pointerdown)="onHandleDown($event, 'e')"><div class="w-2.5 h-2.5 rounded-sm bg-amber-400"></div></button>
    <button class="absolute top-1/2 -translate-y-1/2 -left-3 w-5 h-5 rounded-full bg-white border-2 border-amber-400 flex items-center justify-center shadow pointer-events-auto active:scale-90"
            (pointerdown)="onHandleDown($event, 'w')"><div class="w-2.5 h-2.5 rounded-sm bg-amber-400"></div></button>
    </div>
  </div>
}
