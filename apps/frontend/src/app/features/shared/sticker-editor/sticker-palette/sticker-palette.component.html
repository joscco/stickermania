<div class="px-2 py-2 min-h-0">

  <div class="flex items-center gap-1">

    <!-- Prev button -->
    <button
      class="shrink-0 w-12 self-stretch flex items-center justify-center rounded-xl transition-all duration-150"
      [class.text-stone-500]="canPrev()"
      [class.bg-stone-100]="canPrev()"
      [class.active:bg-stone-200]="canPrev()"
      [class.active:scale-95]="canPrev()"
      [class.text-stone-200]="!canPrev()"
      [class.cursor-default]="!canPrev()"
      [disabled]="!canPrev()"
      (click)="prevPage()"
      (pointerdown)="$event.stopPropagation()"
    >
      <svg viewBox="0 0 24 24" class="w-5 h-5" aria-hidden="true"><use href="assets/sprite.svg#icon-palette-prev"/></svg>
    </button>

    <!-- Sticker row — GSAP handles animation, no CSS transitions needed -->
    <div class="flex-1 overflow-hidden">
      <div
        #rowEl
        class="flex items-center justify-center gap-2"
      >
        @for (sticker of pageStickers(); track sticker.id) {
          <div
            data-thumb
            class="relative shrink-0 w-16 h-16 rounded-xl border-2 flex items-center justify-center bg-white select-none touch-none"
            [class.border-purple-300]="canAddMore()"
            [class.shadow-sm]="canAddMore()"
            [class.border-stone-200]="!canAddMore()"
            [class.opacity-40]="!canAddMore()"
            [class.cursor-grab]="canAddMore()"
            [class.cursor-not-allowed]="!canAddMore()"
            (pointerdown)="onPointerDown($event, sticker)"
          >
            <app-sticker-img
              [imageUrl]="getStickerUrl(sticker.id)"
              [alt]="sticker.id"
              class="w-10 h-10 pointer-events-none select-none"
            />
          </div>
        }
      </div>
    </div>

    <!-- Next button -->
    <button
      class="shrink-0 w-12 self-stretch flex items-center justify-center rounded-xl transition-all duration-150"
      [class.text-stone-500]="canNext()"
      [class.bg-stone-100]="canNext()"
      [class.active:bg-stone-200]="canNext()"
      [class.active:scale-95]="canNext()"
      [class.text-stone-200]="!canNext()"
      [class.cursor-default]="!canNext()"
      [disabled]="!canNext()"
      (click)="nextPage()"
      (pointerdown)="$event.stopPropagation()"
    >
      <svg viewBox="0 0 24 24" class="w-5 h-5" aria-hidden="true"><use href="assets/sprite.svg#icon-palette-next"/></svg>
    </button>

  </div>

  <!-- Page dots -->
  @if (pageCount() > 1) {
    <div class="flex justify-center gap-1.5 mt-1.5 h-2">
      @for (i of range(pageCount()); track i) {
        <div
          class="rounded-full transition-all duration-200 w-1.5 h-1.5"
          [class.bg-purple-400]="currentPage() === i"
          [class.bg-stone-400]="currentPage() !== i"
        ></div>
      }
    </div>
  }
</div>
