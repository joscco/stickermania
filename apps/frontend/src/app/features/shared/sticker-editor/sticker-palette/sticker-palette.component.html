<div class="px-2 py-2 min-h-0">

  <div class="flex items-center gap-1">

    <!-- Prev button -->
    <button
      #prevBtn
      class="shrink-0 w-12 self-stretch flex items-center justify-center rounded-xl text-stone-600"
      [class.bg-stone-100]="canPrev()"
      [class.cursor-default]="!canPrev()"
      [disabled]="!canPrev()"
      (click)="prevPage()"
      (pointerdown)="$event.stopPropagation()"
    >
      <app-icon name="palette-prev" size="md"/>
    </button>

    <!-- Sticker row — GSAP handles animation, no CSS transitions needed -->
    <div class="flex-1 overflow-hidden">
      <div
        #rowEl
        class="flex items-center justify-center gap-2"
      >
        @for (sticker of pageStickers(); track sticker.id) {
          <div
            data-thumb
            class="relative shrink-0 w-16 h-16 rounded-xl border-2 flex items-center justify-center bg-white select-none touch-none"
            [class.border-stone-400]="canAddMore()"
            [class.shadow-sm]="canAddMore()"
            [class.border-stone-200]="!canAddMore()"
            [class.opacity-40]="!canAddMore()"
            [class.cursor-grab]="canAddMore()"
            [class.cursor-not-allowed]="!canAddMore()"
            (pointerdown)="onPointerDown($event, sticker)"
          >
            <app-sticker-img
              [imageUrl]="getStickerUrl(sticker.id)"
              [alt]="sticker.id"
              class="w-full h-full pointer-events-none select-none"
            />
          </div>
        }
      </div>
    </div>

    <!-- Next button -->
    <button
      #nextBtn
      class="shrink-0 w-12 self-stretch flex items-center justify-center rounded-xl text-stone-600"
      [class.bg-stone-100]="canNext()"
      [class.cursor-default]="!canNext()"
      [disabled]="!canNext()"
      (click)="nextPage()"
      (pointerdown)="$event.stopPropagation()"
    >
      <app-icon name="palette-next" size="md"/>
    </button>

  </div>

  <!-- Page dots -->
  @if (pageCount() > 1) {
    <div class="flex justify-center gap-1.5 mt-1.5 h-2">
      @for (i of range(pageCount()); track i) {
        <div
          class="rounded-full transition-all duration-200 w-1.5 h-1.5"
          [class.bg-stone-700]="currentPage() === i"
          [class.scale-125]="currentPage() === i"
          [class.bg-stone-300]="currentPage() !== i"
        ></div>
      }
    </div>
  }
</div>
