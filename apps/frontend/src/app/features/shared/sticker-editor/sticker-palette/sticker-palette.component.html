<div class="px-3 py-2 min-h-0">

  <div class="flex items-center gap-1">

    <!-- Prev button -->
    <button
      #prevBtn
      class="shrink-0 w-12 self-stretch flex items-center justify-center rounded-xl text-white"
      [class.bg-neutral-500]="canPrev()"
      [class.cursor-default]="!canPrev()"
      [disabled]="!canPrev()"
      (click)="prevPage()"
      (pointerdown)="$event.stopPropagation()"
    >
      <app-svg name="icon-palette-prev-md" w="35"/>
    </button>

    <!-- Sticker row — GSAP handles animation, no CSS transitions needed -->
    <div class="flex-1">
      <div
        #rowEl
        class="flex items-center justify-center gap-2"
      >
        @for (sticker of pageStickers(); track sticker.id) {
          <div
            data-thumb
            class="relative shrink-0 w-14 h-14 rounded-xl flex items-center justify-center select-none touch-none checkerboard-sm"
            [class.shadow-sm]="canAddMore()"
            [class.opacity-40]="!canAddMore()"
            [class.cursor-grab]="canAddMore()"
            [class.cursor-not-allowed]="!canAddMore()"
            (pointerdown)="onPointerDown($event, sticker)"
          >
            @if (sticker.packId && packIconLookup().get(sticker.packId); as iconId) {
              <span
                class="absolute -top-2 -left-2 w-5 h-5 rounded-full bg-yellow-400 grid place-items-center pointer-events-none">
                <app-svg [name]="iconId" w="15"/>
              </span>
            }
            <app-sticker-img
              [imageUrl]="getStickerUrl(sticker.id)"
              [alt]="sticker.id"
              class="w-full h-full pointer-events-none select-none"
            />

          </div>
        }
      </div>
    </div>

    <!-- Next button -->
    <button
      #nextBtn
      class="shrink-0 w-12 self-stretch flex items-center justify-center rounded-xl text-white"
      [class.bg-neutral-500]="canNext()"
      [class.cursor-default]="!canNext()"
      [disabled]="!canNext()"
      (click)="nextPage()"
      (pointerdown)="$event.stopPropagation()"
    >
      <app-svg name="icon-palette-next-md" w="35"/>
    </button>

  </div>

  <!-- Page dots -->
  <div class="flex justify-center gap-1.5 mt-1.5">
    @for (i of range(pageCount()); track i) {
      <div
        class="rounded-full transition-all duration-200 w-1 h-1"
        [class.bg-neutral-700]="currentPage() === i"
        [class.scale-125]="currentPage() === i"
        [class.bg-neutral-300]="currentPage() !== i"
      ></div>
    }
  </div>
</div>
