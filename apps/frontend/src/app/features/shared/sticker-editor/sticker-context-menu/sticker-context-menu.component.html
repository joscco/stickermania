@if (visible()) {
  <div
    #panel
    class="absolute bg-white rounded-xl shadow-lg border border-black/8 flex flex-col gap-0.5 p-1 min-w-36 text-xs select-none"
    style="z-index: 9500;"
    [style.left.px]="clampedX()"
    [style.top.px]="clampedY()"
    (pointerdown)="$event.stopPropagation()"
  >
    <button [class]="BTN_DELETE" (click)="emit('delete')">
      <app-svg name="icon-ctx-delete-sm" w="20" class="shrink-0"/>
      Löschen
    </button>

    <div class="h-px bg-black/6 my-0.5"></div>

    <button [class]="canDuplicate() ? BTN : BTN_DISABLED"
            [disabled]="!canDuplicate()"
            (click)="canDuplicate() && emit('duplicate')">
      <app-svg name="icon-ctx-duplicate-sm" w="20" class="shrink-0"/>
      Duplizieren
    </button>

    <button [class]="BTN" (click)="emit('flipH')">
      <app-svg name="icon-ctx-flip-h-sm" w="20" class="shrink-0"/>
      Spiegeln
    </button>

    @if (!isMulti()) {
      <button [class]="stretchMode() ? BTN_ACTIVE : BTN" (click)="emit('toggleStretch')">
        <app-svg name="icon-ctx-stretch-sm" w="20" class="shrink-0"/>
        {{ stretchMode() ? 'Verformen beenden' : 'Verformen' }}
      </button>
    }

    <div class="h-px bg-black/6 my-0.5"></div>

    <button [class]="BTN" (click)="emit('zFront')">
      <app-svg name="icon-ctx-z-front-sm" w="20" class="shrink-0"/>
      Ganz nach vorne
    </button>
    <button [class]="BTN" (click)="emit('zForward')">
      <app-svg name="icon-ctx-z-forward-sm" w="20" class="shrink-0"/>
      Eine Ebene nach vorne
    </button>
    <button [class]="BTN" (click)="emit('zBackward')">
      <app-svg name="icon-ctx-z-backward-sm" w="20" class="shrink-0"/>
      Eine Ebene nach hinten
    </button>
    <button [class]="BTN" (click)="emit('zBack')">
      <app-svg name="icon-ctx-z-back-sm" w="20" class="shrink-0"/>
      Ganz nach hinten
    </button>

    @if (canGroup() || canUngroup()) {
      <div class="h-px bg-black/6 my-0.5"></div>
      @if (canGroup()) {
        <button [class]="BTN" (click)="emit('group')">
          <app-svg name="icon-ctx-group-sm" w="20" class="shrink-0"/>
          Gruppieren
        </button>
      }
      @if (canUngroup()) {
        <button [class]="BTN" (click)="emit('ungroup')">
          <app-svg name="icon-ctx-ungroup-sm" w="20" class="shrink-0"/>
          Gruppierung aufheben
        </button>
      }
    }
  </div>
}
