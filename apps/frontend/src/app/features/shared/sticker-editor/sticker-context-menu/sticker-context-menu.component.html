@if (visible()) {
  <div
    #panel
    class="absolute bg-white rounded-xl shadow-lg border border-black/8 flex flex-col gap-0.5 p-1 min-w-36 text-xs select-none"
    style="z-index: 9500;"
    [style.left.px]="clampedX()"
    [style.top.px]="clampedY()"
    (pointerdown)="$event.stopPropagation()"
  >
    <button [class]="BTN_DELETE" (click)="emit('delete')">
      <svg class="w-3.5 h-3.5 shrink-0" aria-hidden="true"><use href="assets/sprite.svg#icon-ctx-delete"/></svg>
      Löschen
    </button>

    <div class="h-px bg-black/6 my-0.5"></div>

    <button [class]="BTN" (click)="emit('duplicate')">
      <svg class="w-3.5 h-3.5 shrink-0" aria-hidden="true"><use href="assets/sprite.svg#icon-ctx-duplicate"/></svg>
      Duplizieren
    </button>

    <button [class]="BTN" (click)="emit('flipH')">
      <svg class="w-3.5 h-3.5 shrink-0" aria-hidden="true"><use href="assets/sprite.svg#icon-ctx-flip-h"/></svg>
      Spiegeln
    </button>

    @if (!isMulti()) {
      <button [class]="stretchMode() ? BTN_ACTIVE : BTN" (click)="emit('toggleStretch')">
        <svg class="w-3.5 h-3.5 shrink-0" aria-hidden="true"><use href="assets/sprite.svg#icon-ctx-stretch"/></svg>
        {{ stretchMode() ? 'Verformen beenden' : 'Verformen' }}
      </button>
    }

    <div class="h-px bg-black/6 my-0.5"></div>

    <button [class]="BTN" (click)="emit('zFront')">
      <svg class="w-3.5 h-3.5 shrink-0" aria-hidden="true"><use href="assets/sprite.svg#icon-ctx-z-front"/></svg>
      Ganz nach vorne
    </button>
    <button [class]="BTN" (click)="emit('zForward')">
      <svg class="w-3.5 h-3.5 shrink-0" aria-hidden="true"><use href="assets/sprite.svg#icon-ctx-z-forward"/></svg>
      Eine Ebene nach vorne
    </button>
    <button [class]="BTN" (click)="emit('zBackward')">
      <svg class="w-3.5 h-3.5 shrink-0" aria-hidden="true"><use href="assets/sprite.svg#icon-ctx-z-backward"/></svg>
      Eine Ebene nach hinten
    </button>
    <button [class]="BTN" (click)="emit('zBack')">
      <svg class="w-3.5 h-3.5 shrink-0" aria-hidden="true"><use href="assets/sprite.svg#icon-ctx-z-back"/></svg>
      Ganz nach hinten
    </button>

    @if (canGroup() || canUngroup()) {
      <div class="h-px bg-black/6 my-0.5"></div>
      @if (canGroup()) {
        <button [class]="BTN" (click)="emit('group')">
          <svg class="w-3.5 h-3.5 shrink-0" aria-hidden="true"><use href="assets/sprite.svg#icon-ctx-group"/></svg>
          Gruppieren
        </button>
      }
      @if (canUngroup()) {
        <button [class]="BTN" (click)="emit('ungroup')">
          <svg class="w-3.5 h-3.5 shrink-0" aria-hidden="true"><use href="assets/sprite.svg#icon-ctx-ungroup"/></svg>
          Gruppierung aufheben
        </button>
      }
    }
  </div>
}
