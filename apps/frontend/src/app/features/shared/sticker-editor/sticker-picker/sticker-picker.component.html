<!-- Full-screen backdrop -->
<div
  class="picker-backdrop-inner fixed inset-0 bg-black/30"
  (click)="close.emit()"
></div>

<!-- Sheet inside canvas area -->
<div
  class="picker-sheet absolute inset-1 bg-white flex flex-col shadow-2xl"
  (click)="$event.stopPropagation()"
>
  <!-- Header -->
  <div class="flex items-center justify-between px-5 py-3 border-b border-neutral-200 shrink-0">
    <span class="text-lg font-bold">Sticker auswählen</span>
    <button
      class="w-8 h-8 rounded-full bg-neutral-100 flex items-center justify-center text-neutral-600 active:bg-neutral-200"
      (click)="close.emit()"
    >
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="w-5 h-5">
        <path d="M6 6l12 12M18 6L6 18"/>
      </svg>
    </button>
  </div>

  <!-- Body: pack list (left) + sticker grid (right) -->
  <div class="flex flex-1 min-h-0">
    <!-- Pack sidebar -->
    <div class="w-32 shrink-0 border-r border-neutral-200 overflow-y-auto bg-neutral-50">
      <button
        class="w-full px-2 py-3 text-left text-sm font-medium transition-colors"
        [class.bg-yellow-400]="!selectedPackId()"
        [class.bg-white]="!!selectedPackId()"
        (click)="selectPack(null)"
      >
        Alle
      </button>
      @for (pack of availablePacks(); track pack.id) {
        <button
          class="w-full px-2 py-3 text-left text-sm font-medium transition-colors flex items-center gap-1.5"
          [class.bg-yellow-400]="selectedPackId() === pack.id"
          [class.bg-white]="selectedPackId() !== pack.id"
          [class.text-neutral-400]="selectedPackId() !== pack.id"
          (click)="selectPack(pack.id)"
        >
          @if (packIconLookup().get(pack.id); as iconId) {
            <app-svg [name]="iconId" w="16" class="shrink-0"/>
          }
          <span class="truncate text-xs">{{ pack.name }}</span>
          @if (recommendedPackIds().includes(pack.id)) {
            <span class="text-yellow-500 text-xs ml-auto">★</span>
          }
        </button>
      }
    </div>

    <!-- Sticker grid -->
    <div class="flex-1 overflow-y-auto p-3">
      <div class="grid grid-cols-3 gap-2">
        @for (sticker of currentStickers(); track sticker.id) {
          <button
            class="aspect-square flex items-center justify-center checkerboard-sm active:scale-95 transition-transform relative"
            [class.opacity-40]="!canAddMore()"
            (pointerdown)="onPointerDown($event, sticker)"
          >
            <app-sticker-img
              [imageUrl]="sticker.imageUrl"
              [alt]="sticker.id"
              class="w-full h-full pointer-events-none select-none"
            />
            @if (recommendedStickerIds().has(sticker.id)) {
              <span class="absolute -top-1 -right-1 text-yellow-500 text-sm leading-none drop-shadow">★</span>
            }
          </button>
        }
      </div>
      @if (currentStickers().length === 0) {
        <div class="flex items-center justify-center h-full text-neutral-400 text-sm">
          Keine Sticker verfügbar
        </div>
      }
    </div>
  </div>
</div>
