<!-- Canvas area: fills available space, square canvas inside -->
<div
  #canvasAreaEl
  animOnInit="opacity"
  class="flex-1 min-h-0 bg-white p-2 flex items-center justify-center"
>

  <div
    [style.width.px]="canvasSizePx()"
    [style.height.px]="canvasSizePx()"
    class="relative mx-auto"
    style="overflow: visible;"
  >
    <app-sticker-canvas
      #stickerCanvas
      class="block w-full h-full"
      [stickers]="allPlacements()"
      [stickerCatalog]="stickerCatalog()"
      [maxStickers]="maxStickers()"
      (placementsChanged)="onPlacementsChanged($event)"
      (stickerRemoved)="onStickerRemoved($event)"
      (clearAll)="clearPlacements()"
    />
  </div>
</div>

<!-- Palette strip — z-20 so it visually covers canvas overflow upwards -->
<div animOnInit="opacity" class="relative z-20 shrink-0 bg-white">
  <app-sticker-palette
    [stickers]="paletteStickers()"
    [stickerPacks]="stickerPacks()"
    [canAddMore]="canAddMore()"
    (stickerDragStarted)="onStickerDragFromPaletteStarted($event)"
  />
</div>
