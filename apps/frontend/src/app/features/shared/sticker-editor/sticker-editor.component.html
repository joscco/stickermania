<!-- Canvas area: full-width bg, canvas square centered inside -->
<div animOnInit="opacity"
     class="relative bg-white p-2">

  <!-- Square canvas wrapper centered horizontally -->
  <div [style.width.px]="canvasSizePx()"
       [style.height.px]="canvasSizePx()"
       class="mx-auto relative" style="overflow: visible;">
    <app-sticker-canvas
      #stickerCanvas
      class="block w-full h-full"
      [stickers]="placements()"
      [stickerCatalog]="stickerCatalog()"
      [maxStickers]="maxStickers()"
      (placementsChanged)="onPlacementsChanged($event)"
      (stickerRemoved)="onStickerRemoved($event)"
    />

    <!-- Floating toolbar: sticker count + clear all -->
    <div data-canvas-toolbar
         class="absolute top-1.5 left-1.5 flex items-center gap-1.5 px-2 py-1 bg-white/80 backdrop-blur-sm rounded-md shadow-sm z-30">
      <span class="text-xs select-none transition-colors"
            [class.text-red-400]="!canAddMore()"
            [class.text-stone-400]="canAddMore()"
      >{{ placements().length }}/{{ maxStickers() }}</span>
      <button
        class="disabled:opacity-30 flex items-center justify-center"
        title="Alle Sticker entfernen"
        [disabled]="placements().length <= 0"
        (click)="clearPlacements()"
      >
        <app-svg name="icon-editor-clear-all-sm" w="20"/>
      </button>
    </div>
  </div>
</div>

<!-- Palette strip — z-20 so it visually covers canvas overflow upwards (stickers go behind palette once released) -->
<div #paletteRef animOnInit="opacity" class="relative z-20 shrink-0 border-t border-black/10 bg-white">
  <app-sticker-palette
    [stickers]="paletteStickers()"
    [stickerPacks]="stickerPacks()"
    [canAddMore]="canAddMore()"
    (stickerDragStarted)="onStickerDragFromPaletteStarted($event)"
  />
</div>
