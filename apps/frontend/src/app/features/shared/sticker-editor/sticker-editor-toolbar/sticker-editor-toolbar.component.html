<div class="flex items-center justify-center gap-3 px-4 pb-4 shrink-0">
  @if (showGameButtons()) {
    <button class="bg-white text-black py-2 px-4 rounded-xl font-semibold active:scale-95 transition-transform"
            (click)="skip.emit()">Aussetzen
    </button>
  }
  <button
    class="w-11 h-11 rounded-xl bg-white flex items-center justify-center active:scale-90 transition-transform disabled:opacity-30"
    title="Alle Sticker entfernen"
    [disabled]="placementCount() === 0"
    (click)="clearAll.emit()">
    <app-svg name="icon-editor-clear-all-sm" w="24"/>
  </button>

  <span class="text-xs text-white tabular-nums w-10 text-center"
        [class.text-black]="isFull()"
  >{{ placementCount() }}/{{ maxStickers() }}</span>

  <button
    class="w-11 h-11 rounded-xl flex items-center justify-center shadow active:scale-90 transition-all duration-200 disabled:opacity-40"
    [class.bg-white]="!showPicker()"
    [class.bg-black]="showPicker()"
    [class.text-black]="!showPicker()"
    [class.text-white]="showPicker()"
    [disabled]="isFull() && !showPicker()"
    (click)="togglePicker.emit()">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none"
         class="w-7 h-7 transition-transform duration-300"
         [class.rotate-45]="showPicker()">
      <rect x="4" y="20" width="40" height="8" rx="4" fill="currentColor"/>
      <rect x="20" y="4" width="8" height="40" rx="4" fill="currentColor"/>
    </svg>
  </button>

  @if (showGameButtons()) {
    <button
      class="bg-black text-white py-2 px-4 rounded-xl font-semibold active:scale-95 transition-transform disabled:opacity-40"
      [disabled]="placementCount() === 0"
      (click)="submit.emit()">Einreichen
    </button>
  }
</div>
