<div #wrapper class="relative overflow-hidden no-select bg-white"
     style="width: min(95vw, calc(100dvh - 260px)); aspect-ratio: 1; touch-action: none; user-select: none; -webkit-touch-callout: none; -webkit-user-select: none;"
     (pointerdown)="$event.preventDefault()"
     (pointermove)="$event.preventDefault()">

  <svg class="absolute inset-0 w-full h-full pointer-events-none z-20" aria-hidden="true">
    <use href="assets/sprite.svg#draw-frame"/>
  </svg>
  <canvas #drawCanvas style="touch-action: none;"
          [class]="'absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2'"
          [style.width]="canvasSizePercent"
          [style.height]="canvasSizePercent"
          (pointerdown)="painter.pointerDown($event)"
          (pointermove)="painter.pointerMove($event)"
          (pointerup)="painter.pointerUp($event)"
          (pointercancel)="painter.pointerUp($event)"
  ></canvas>
</div>

<!-- Tool bar -->
<div class="flex items-center justify-center gap-3 -mt-5">
  <button class="w-20 h-20 z-30 flex items-center justify-center rounded-full transition-all"
          [class.bg-stone-200]="brushThin() && !eraserMode()"
          [class.scale-110]="brushThin() && !eraserMode()"
          (click)="selectThinBrush()">
    <app-icon name="draw-btn-small" size="lg"/>
  </button>
  <button class="w-20 h-20 z-30  flex items-center justify-center rounded-full transition-all"
          [class.bg-stone-200]="!brushThin() && !eraserMode()"
          [class.scale-110]="!brushThin() && !eraserMode()"
          (click)="selectThickBrush()">
    <app-icon name="draw-btn-big" size="lg"/>
  </button>
  <button class="w-20 h-20 z-30 flex items-center justify-center rounded-full transition-all"
          [class.bg-stone-200]="eraserMode()"
          [class.scale-110]="eraserMode()"
          (click)="selectEraser()">
    <app-icon name="draw-btn-eraser" size="lg"/>
  </button>
</div>
