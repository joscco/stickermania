<div
  class="mx-auto shrink-0 w-full flex items-center justify-center text-black text-center box-border banner-bg"
  [style.max-width.px]="cappedMaxWidth()"
  [style.height.px]="BANNER_HEIGHT"
  [style.border-width]="borderWidthPx()"
  [animOnInit]="anim()"
>
  <div class="flex flex-col items-center justify-center min-w-0 flex-1">
    @if (subtitle()) {
      <span
        class="font-semibold uppercase tracking-wider opacity-60 whitespace-nowrap shrink-0"
        [style.fontSize]="subtitleFontSize()"
        [style.lineHeight.px]="subtitleLineHeight()"
      >{{ subtitle() }}</span>
    }
    <div
      class="flex items-center justify-center gap-2 font-extrabold break-words text-center w-full"
      [style.fontSize]="fontSize()"
      [style.line-height]="textLineHeight()"
    >
      @if (icon()) {
        <app-svg [name]="icon()" [w]="40" class="shrink-0 self-center"/>
      }
      {{ text() }}
    </div>
  </div>
</div>
