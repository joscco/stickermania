<div
  #board
  class="w-full h-full relative overflow-hidden"
  style="background-size: contain; background-position: center; background-repeat: no-repeat;"
  [style.background-image]="backgroundImage() ? 'url(' + backgroundImage() + ')' : null"
  (pointerdown)="onBoardPointerDown($event)"
>
  @if (stickerName()) {
    <div
      class="absolute"
      [style.left.%]="position().x"
      [style.top.%]="position().y"
      style="transform: translate(-50%, -50%);"
    >
      <div #sticker class="w-16 h-16">
        <div
          data-sticker
          class="w-full h-full cursor-grab active:cursor-grabbing"
          (pointerdown)="onStickerPointerDown($event)"
        >
          <app-svg [name]="stickerName()" w="64" h="64" />
        </div>
      </div>
    </div>
  }
</div>
