<div class="relative w-full h-7 bg-stone-300/60 rounded-md overflow-hidden select-none">
  <!-- fill that shrinks left ← right -->
  <!-- transition and colour classes are only active while the timer is still
       counting down (percent > 0). When the round ends -- naturally or early --
       the fill snaps to 0 % instantly and the outer animPresence opacity
       animation handles the visual transition. -->
  <div
    class="absolute inset-y-0 left-0 rounded-md"
    [style.width.%]="percent()"
    [class.transition-[width]]="percent() > 0"
    [class.duration-500]="percent() > 0"
    [class.ease-linear]="percent() > 0"
    [class.bg-yellow-400]="percent() > 25"
    [class.bg-red-400]="percent() > 0 && percent() <= 25"
  ></div>
  <!-- time label centred on top -->
  <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-xs font-mono font-bold tracking-tight text-black">{{ display() }}</span>
  </div>
</div>
