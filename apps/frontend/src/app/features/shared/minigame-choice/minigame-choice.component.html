<div class="grid grid-cols-2 gap-3 w-full max-w-xs">
  @for (opt of options(); track $index) {
    <button
      (click)="toggle($index)"
      class="flex flex-col items-center gap-2 p-4 rounded-xl border-2 bg-white transition-all active:scale-95"
      [class.border-black]="selected().includes($index)"
      [class.border-neutral-200]="!selected().includes($index)"
    >
      @if (opt.emoji) {
        <span class="text-2xl">{{ opt.emoji }}</span>
      }
      <span class="text-sm font-medium text-neutral-900">{{ opt.label }}</span>
    </button>
  }
</div>
