<!-- Your secret extra task -->
@if (displayExtraTask()) {
  <div class="shrink-0 text-center px-4 py-1">
    <span class="text-xs text-neutral-500">Dein Zusatzauftrag:</span>
    <span class="text-sm font-bold bg-black text-white px-3 py-0.5 rounded-full ml-1">{{ displayExtraTask() }}</span>
  </div>
}

<!-- Canvas area: fills remaining space, canvas uses cqmin to stay square -->
<div class="flex-1 min-h-0 w-full"
     style="container-type: size; overflow: hidden; display: grid; place-items: center;">
  <div #wrapper class="w-[100cqmin] aspect-square relative overflow-hidden no-select"
       style="touch-action: none; user-select: none; -webkit-touch-callout: none; -webkit-user-select: none;"
       (pointerdown)="$event.preventDefault()"
       (pointermove)="$event.preventDefault()">
    @if (baseImageUrl()) {
      @if (isBgSprite()) {
        <svg class="w-full h-full absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none">
          <use [attr.href]="'#' + bgSpriteId()" width="100%" height="100%" />
        </svg>
      } @else {
        <img [src]="baseImageUrl()"
             [class]="'w-full h-full absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 object-contain'"
             style="z-index: 0; pointer-events: none;" draggable="false" />
      }
    }
    <app-svg name="editor-frame" class="absolute inset-0 w-[101%] h-[101%] pointer-events-none -z-10"/>
    <canvas #drawCanvas style="touch-action: none;"
            [class]="'w-full h-full absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2'"
            (pointerdown)="painter.pointerDown($event)"
            (pointermove)="painter.pointerMove($event)"
            (pointerup)="painter.pointerUp($event)"
            (pointercancel)="painter.pointerUp($event)"
    ></canvas>
  </div>
</div>


<!-- Brush controls -->
<div class="shrink-0 flex items-center justify-center w-full px-2 py-1 gap-1">
  <button class="flex items-center justify-center rounded-full transition-all p-1.5 scale-90 hover:scale-100 active:scale-110"
          (click)="clear()">
    <app-svg name="icon-draw-btn-delete" w="64"/>
  </button>
  <button class="flex items-center justify-center rounded-full transition-all p-1.5 scale-90 hover:scale-100 active:scale-110"
          [class.bg-white]="drawMode() === 'small'"
          [class.scale-100]="drawMode() === 'small'"
          (click)="drawMode.set('small')">
    <app-svg name="icon-draw-btn-small-lg" w="64"/>
  </button>
  <button class="flex items-center justify-center rounded-full transition-all p-1.5 scale-90 hover:scale-100 active:scale-110"
          [class.bg-white]="drawMode() === 'big'"
          [class.scale-100]="drawMode() === 'big'"
          (click)="drawMode.set('big')">
    <app-svg name="icon-draw-btn-big-lg" w="64"/>
  </button>
  <button class="flex items-center justify-center rounded-full transition-all p-1.5 scale-90 hover:scale-100 active:scale-110"
          [class.bg-white]="drawMode() === 'erase'"
          [class.scale-100]="drawMode() === 'erase'"
          (click)="drawMode.set('erase')">
    <app-svg name="icon-draw-btn-eraser-lg" w="64"/>
  </button>
</div>
