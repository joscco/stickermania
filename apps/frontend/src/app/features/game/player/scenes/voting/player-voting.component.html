<div animOnInit="banner" class="text-black px-8 py-2 pt-3 text-center shrink-0"
     style="background-image: url('assets/svg/prompt-background.svg'); background-size: 100% 100%;">
  <span class="text-xs font-medium opacity-60 uppercase tracking-wider">Abstimmung</span>
  <h2 class="text-base font-bold">{{ vm().prompt }}</h2>
</div>

@if (vm().variant === 'active') {
  <div animOnInit="opacity" [animDelay]="0.15" class="flex-1 overflow-y-auto">
    <app-sticker-voting
      [submissions]="vm().submissions"
      [stickerCatalog]="vm().stickerCatalog"
      [myVotes]="vm().myVotes"
      [votesRemaining]="vm().votesRemaining"
      [players]="vm().players"
      [myPlayerId]="vm().myPlayerId"
      (voteClicked)="castVote.emit($event)"
    />
  </div>

  <div class="shrink-0 border-t border-black/10 bg-white px-4 py-3 flex flex-col gap-2">
    <button
      class="w-full bg-black text-white py-2.5 rounded-xl font-semibold shadow active:scale-95 transition-transform"
      (click)="doneVoting.emit()"
    >Ich bin fertig</button>
  </div>
} @else {
  <app-player-voting-done
    [allVotingDone]="vm().variant === 'all-done'"
    (endVotingEarly)="endVotingEarly.emit()"
  />
}
