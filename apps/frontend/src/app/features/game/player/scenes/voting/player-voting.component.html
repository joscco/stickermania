<app-round-info
  [roundIndex]="0"
  [title]="vm().prompt"
  [task]="vm().currentTask"
/>

@if (vm().variant === 'active') {
  <div animOnInit="opacity" [animDelay]="0.15" class="flex-1 overflow-y-auto">
    <app-minigame-voting
      [submissions]="vm().submissions"
      [minigameSubmissions]="vm().minigameSubmissions"
      [currentTask]="vm().currentTask"
      [myVotes]="vm().myVotes"
      [votesRemaining]="vm().votesRemaining"
      [players]="vm().players"
      [myPlayerId]="vm().myPlayerId"
      (voteClicked)="castVote.emit($event)"
    />
  </div>

  <div class="w-full shrink-0 px-4 py-3 flex flex-col gap-2 items-center justify-center">
    <button
      class="bg-black text-white py-2.5 px-4 rounded-xl font-semibold shadow active:scale-95 transition-transform"
      (click)="doneVoting.emit()"
    >Ich bin fertig</button>
  </div>
} @else {
  <app-player-voting-done
    [allVotingDone]="vm().variant === 'all-done'"
    (endVotingEarly)="endVotingEarly.emit()"
  />
}
