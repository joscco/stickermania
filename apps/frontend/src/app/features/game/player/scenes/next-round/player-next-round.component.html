<div animGroup="opacity" class="flex-1 flex flex-col items-center justify-center gap-4 p-6 text-center">
  <app-svg animOnInit="opacity" name="icon-stickers-lg" w="70" class="text-stone-600"/>
  <h2 animOnInit="opacity" class="text-base font-bold text-stone-800">Die nächste Runde startet...</h2>
  @if (hasNewPack()) {
    <p animOnInit="opacity" class="text-sm text-stone-700 font-medium">
      Neues Pack freigeschaltet!
    </p>
  }
</div>
