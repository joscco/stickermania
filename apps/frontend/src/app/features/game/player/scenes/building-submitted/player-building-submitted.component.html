<app-player-status-screen
  icon="icon-checkmark-lg"
  title="Du hast eingereicht!"
  subtitle="Warte auf das Ende der Runde..."
>
  @if (allPlayersDone()) {
    <button
      class="mt-2 bg-black text-white px-6 py-2.5 rounded-xl font-semibold shadow-lg active:scale-95 transition-transform"
      (click)="endRoundEarly.emit()"
    >Runde schließen</button>
  }
</app-player-status-screen>
