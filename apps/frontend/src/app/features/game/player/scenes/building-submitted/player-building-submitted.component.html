<div animGroup="opacity" class="flex-1 flex flex-col items-center justify-center gap-4 p-6 text-center">
  <app-svg animOnInit="opacity" name="icon-checkmark-lg" w="70"/>
  <p animOnInit="opacity" class="text-stone-600 text-base font-medium">Du hast eingereicht!</p>
  <p animOnInit="opacity" class="text-stone-400 text-sm">Warte auf das Ende der Runde...</p>
  @if (allPlayersDone()) {
    <button
      class="mt-2 bg-black text-white px-6 py-2.5 rounded-xl font-semibold shadow-lg active:scale-95 transition-transform"
      (click)="endRoundEarly.emit()"
    >Runde schließen</button>
  }
</div>
