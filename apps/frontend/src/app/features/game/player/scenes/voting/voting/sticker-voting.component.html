<div class="p-3 flex flex-col items-center justify-center text-center">
  <p class="text-sm text-neutral-500 mb-3">Tippe auf eine Collage, um deinen Stern zu vergeben.</p>

  <div class="w-full flex flex-row items-center justify-center gap-2 flex-wrap">
    @for (submission of votableSubmissions(); track submission.id) {
      @let voted = getMyVote() === submission.id;
      <button
        class="relative w-full max-w-48 justify-self-center rounded-xl border-2 p-1 bg-white transition-all active:scale-95"
        [class.border-black]="voted"
        [class.shadow-md]="voted"
        [class.border-neutral-200]="!voted"
        (click)="onVote(submission.id)"
      >
        <div class="relative w-full aspect-square max-h-48 bg-neutral-50 rounded-lg overflow-hidden flex items-center justify-center">
          @if (submission.snapshotUrl) {
            <img
              [src]="submission.snapshotUrl"
              alt="Collage"
              class="w-full h-full object-contain"
              draggable="false"
            />
          } @else {
            <div class="text-neutral-300 text-4xl">?</div>
          }
        </div>
        <!-- Star badge: shown when this collage has the vote -->
        @if (voted) {
          <div
            class="absolute top-1 right-1 w-6 h-6 rounded-full bg-black text-white flex items-center justify-center text-xs font-bold shadow">
            ★
          </div>
        }
      </button>
    }
  </div>

  @if (ownSubmission(); as mine) {
    <div class="mt-3 text-xs font-semibold text-neutral-500">Dein Bild:</div>
    <div class="w-32 my-1 rounded-xl border border-neutral-200 bg-neutral-50 p-2">
      <div class="flex flex-col items-center gap-2">
        <div class="relative w-full aspect-square max-h-48 shrink-0 rounded-lg bg-white overflow-hidden border border-neutral-100 flex items-center justify-center">
          @if (mine.snapshotUrl) {
            <img [src]="mine.snapshotUrl" alt="Eigene Collage" class="w-full h-full object-contain" draggable="false"/>
          } @else {
            <div class="text-neutral-300 text-4xl">?</div>
          }
        </div>
      </div>
    </div>
    <div class="text-[0.6rem] text-neutral-400">(Nicht abstimmbar)</div>
  }
</div>
