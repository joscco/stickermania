<div animGroup="opacity" [animDelay]="0.05" class="h-full flex flex-col items-center justify-center gap-4">
  <app-svg animOnInit="opacity" name="icon-timer-lg" w="70" class="text-stone-400"/>
  <span animOnInit="opacity" class="text-base font-semibold text-stone-600">Verbindung unterbrochen</span>
  <div animOnInit="opacity" class="flex items-center gap-2 text-stone-400 text-xs">
    <div class="w-3 h-3 border-2 border-stone-200 border-t-stone-400 rounded-full animate-spin"></div>
    Versuche erneut zu verbinden...
  </div>
</div>
