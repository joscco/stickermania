<div animGroup="opacity" class="h-full flex flex-col overflow-hidden p-4">

  <!-- Title -->
  <div animOnInit="opacity" class="text-center py-1">
    <h2 class="text-lg font-bold">Hallo {{ playerName() }}!</h2>
    <p class="text-xs text-neutral-500">Zeichne deinen Avatar</p>
  </div>

  <!-- Canvas area: fills remaining space, canvas uses cqmin to stay square -->
  <div class="flex-1 min-h-0 w-full"
       style="container-type: size; overflow: hidden; display: grid; place-items: center;">
    <app-drawing-canvas class="w-[100cqmin]"
      animOnInit="opacity"
      #drawingCanvas
      [initialImage]="initialAvatarImage()"
      [drawMode]="drawMode()"
      (submitted)="avatarSubmitted.emit($event)"
    />
  </div>


  <!-- Buttons -->
  <div animOnInit="opacity" class="flex items-center justify-center w-full self-center gap-0">
    <!-- Brush buttons -->
    <button class="flex items-center justify-center rounded-full transition-all p-1 scale-90 hover:scale-100 active:scale-110"
            (click)="clear()">
      <app-svg name="icon-draw-btn-delete" w="70"/>
    </button>
    <button class="flex items-center justify-center rounded-full transition-all p-1 scale-90 hover:scale-100 active:scale-110"
            [class.bg-white]="drawMode() === 'small'"
            [class.scale-100]="drawMode() === 'small'"
            (click)="selectThinBrush()">
      <app-svg name="icon-draw-btn-small-lg" w="70"/>
    </button>

    <button class="flex items-center justify-center rounded-full transition-all p-1 scale-90 hover:scale-100 active:scale-110"
            [class.bg-white]="drawMode() === 'big'"
            [class.scale-100]="drawMode() === 'big'"
            (click)="selectThickBrush()">
      <app-svg name="icon-draw-btn-big-lg" w="70"/>
    </button>

    <button class="flex items-center justify-center rounded-full transition-all p-1 scale-90 hover:scale-100 active:scale-110"
            [class.bg-white]="drawMode() === 'erase'"
            [class.scale-100]="drawMode() === 'erase'"
            (click)="selectEraser()">
      <app-svg name="icon-draw-btn-eraser-lg" w="70"/>
    </button>
    <button class="flex items-center justify-center rounded-full transition-all p-1 scale-90 hover:scale-100 active:scale-110"
            (click)="submit()">
      <app-svg name="icon-draw-btn-accept" w="70"/>
    </button>
  </div>

</div>
