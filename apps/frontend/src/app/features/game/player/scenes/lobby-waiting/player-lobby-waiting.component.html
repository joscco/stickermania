<div animGroup="opacity" class="h-full flex flex-col items-center justify-center gap-4 p-6 text-center">
  <app-svg animOnInit="opacity" name="icon-stickers-lg" w="70" class="text-stone-600"/>
  <h2 animOnInit="opacity" class="text-xl font-bold text-stone-800">Stickermania</h2>
  <p animOnInit="opacity" class="text-stone-500 text-sm">Warte, bis das Spiel gestartet wird...</p>

  <button
    animOnInit="opacity"
    class="mt-4 bg-black text-white px-6 py-2.5 rounded-xl font-semibold shadow-lg active:scale-95 transition-transform"
    (click)="stickerService.startGame()"
  >Alle da — Los geht's!</button>
</div>
