<div animGroup="item" class="h-full flex flex-col items-center justify-center gap-4 p-6 text-center">
  <app-icon animOnInit="item" name="paintbrush" size="lg" class="text-purple-400"/>
  <h2 animOnInit="item" class="text-xl font-bold text-stone-800">Stickermania</h2>
  <p animOnInit="item" class="text-stone-500 text-sm">Warte, bis das Spiel gestartet wird...</p>

  <button
    animOnInit="item"
    class="mt-4 bg-purple-600 text-white px-6 py-2.5 rounded-xl font-semibold shadow-lg active:scale-95 transition-transform"
    (click)="stickerService.startGame()"
  >Alle da — Los geht's!</button>
</div>
