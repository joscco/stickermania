<div animOnInit="choice" [animDelay]="0.25">
  <h3 class="text-sm font-semibold text-stone-700 mb-2">{{ title() }}</h3>
  <div class="space-y-2">
    @for (choice of choices(); track choice) {
      <button
        class="w-full text-center p-3 rounded-xl border-2 border-stone-200 bg-white text-sm font-medium active:scale-[0.98] transition-transform hover:border-stone-400"
        (click)="choiceMade.emit(choice)"
      >
        @if (choice.iconId) {
          <app-svg [name]="choice.iconId" [w]="40"/>
        }
        <div class="text-xs font-medium mt-1">{{ choice.name }}</div>
      </button>
    }
  </div>
</div>
