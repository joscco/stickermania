<div animGroup="opacity" class="h-full flex flex-col items-center">
  <app-prompt-banner
    [text]="prompt()"
    [subtitle]="'Runde ' + roundIndex()"
    anim="banner"
    class="w-full px-4"
  />

  @if (myHand()) {
    <app-sticker-editor
      #editor
      [paletteStickers]="handStickers()"
      [stickerCatalog]="stickerCatalog()"
      [stickerPacks]="stickerPacks()"
      [maxStickers]="maxStickersOnCanvas()"
      class="flex-1 min-h-0 w-full"
    />
  } @else {
    <div class="h-full flex items-center justify-center gap-2 text-neutral-400 text-base">
      <div class="w-4 h-4 border-2 border-neutral-200 border-t-neutral-400 rounded-full animate-spin"></div>
      Sticker werden geladen...
    </div>
  }


  <!-- Footer: submit -->
  <div animOnInit="opacity" class="w-full max-w-lg bg-white px-4 pb-2 flex items-center gap-3">
    <button
      class="flex-1 bg-yellow-400 text-black py-2.5 rounded-xl font-semibold active:scale-95 transition-transform disabled:opacity-40 disabled:active:scale-100"
      (click)="skipRound.emit()"
    >
      Überspringen
    </button>
    <button
      class="flex-2 bg-black text-white py-2.5 rounded-xl font-semibold active:scale-95 transition-transform disabled:opacity-40 disabled:active:scale-100"
      [disabled]="placements.length === 0"
      (click)="onSubmit()"
    >
      Einreichen
    </button>
  </div>
</div>
