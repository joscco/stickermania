<div animGroup="opacity" class="h-full flex flex-col items-center">
  <app-prompt-banner
    [text]="prompt()"
    [subtitle]="'Runde ' + roundIndex()"
    anim="banner"
    class="w-full px-4"
  />

  @if (stickerCatalog().length > 0) {
    <app-sticker-editor
      #editor
      [stickerCatalog]="stickerCatalog()"
      [stickerPacks]="stickerPacks()"
      [unlockedPackIds]="unlockedPackIds()"
      [recommendedPackIds]="recommendedPackIds()"
      [maxStickers]="maxStickersOnCanvas()"
      class="flex-1 min-h-0 w-full"
    />

    <app-sticker-editor-toolbar
      animOnInit="opacity"
      [placementCount]="editor.placements().length"
      [maxStickers]="maxStickersOnCanvas()"
      [canAddMore]="editor.placements().length < maxStickersOnCanvas()"
      [showPicker]="editor.showPicker()"
      [showGameButtons]="true"
      (clearAll)="editor.clearPlacements()"
      (togglePicker)="editor.showPicker() ? editor.onPickerClose() : editor.showPicker.set(true)"
      (skip)="skipRound.emit()"
      (submit)="onSubmit()"
      class="pt-1 w-full px-2"
    />
  } @else {
    <div class="h-full flex items-center justify-center gap-2 text-neutral-400 text-base">
      <div class="w-4 h-4 border-2 border-neutral-200 border-t-neutral-400 rounded-full animate-spin"></div>
      Sticker werden geladen...
    </div>
  }
</div>
