<div animGroup="opacity" class="h-full flex flex-col items-center">
  <app-prompt-banner
    [text]="prompt()"
    [subtitle]="'Runde ' + roundIndex()"
    anim="banner"
    class="w-full px-4"
  />

  @switch (task()?.type) {
    @case ('sticker-place') {
      <app-sticker-board
        #stickerBoard
        class="flex-1 min-h-0 w-full"
        [backgroundImage]="$any(task())?.['backgroundSvg'] ?? null"
        [stickerName]="'sprite:#' + ($any(task())?.['stickerSvg'] ?? 'sticker-shapes-heart')"
      />
      <div class="shrink-0 px-4 py-3 flex gap-2 w-full">
        <button (click)="skipRound.emit()" class="flex-1 bg-neutral-200 text-neutral-700 py-2.5 rounded-xl font-semibold active:scale-95 transition-transform">Uberspringen</button>
        <button (click)="onSubmitStickerPlace()" class="flex-1 bg-black text-white py-2.5 rounded-xl font-semibold shadow active:scale-95 transition-transform">Absenden</button>
      </div>
    }
    @case ('drawing') {
      @let bg = $any(task())?.['backgroundSvg'];
      <app-drawing-canvas-bg
        #drawingCanvas
        [baseImageUrl]="bg ?? null"
        (submitted)="onSubmitDrawing($event)"
      />
      <div class="shrink-0 px-4 py-3 flex gap-2 w-full">
        <button (click)="skipRound.emit()" class="flex-1 bg-neutral-200 text-neutral-700 py-2.5 rounded-xl font-semibold active:scale-95 transition-transform">Uberspringen</button>
        <button (click)="drawingCanvas.submit()" class="flex-1 bg-black text-white py-2.5 rounded-xl font-semibold shadow active:scale-95 transition-transform">Absenden</button>
      </div>
    }
    @case ('choice') {
      <div class="flex-1 flex flex-col items-center justify-center w-full">
        <app-minigame-choice
          class="w-full"
          [options]="$any(task())?.['options'] ?? []"
          (submitted)="onSubmitChoice($event)"
        />
      </div>
      <div class="shrink-0 px-4 py-3 w-full">
        <button (click)="skipRound.emit()" class="w-full bg-neutral-200 text-neutral-700 py-2.5 rounded-xl font-semibold active:scale-95 transition-transform">Uberspringen</button>
      </div>
    }
    @case ('number') {
      <div class="flex-1 flex flex-col items-center justify-center w-full">
        <app-minigame-number
          [min]="$any(task())?.['min'] ?? 1"
          [max]="$any(task())?.['max'] ?? 100"
          [default]="$any(task())?.['default'] ?? 50"
          (submitted)="onSubmitNumber($event)"
        />
      </div>
      <div class="shrink-0 px-4 py-3 w-full">
        <button (click)="skipRound.emit()" class="w-full bg-neutral-200 text-neutral-700 py-2.5 rounded-xl font-semibold active:scale-95 transition-transform">Uberspringen</button>
      </div>
    }
    @case ('timer-stop') {
      <div class="flex-1 flex flex-col items-center justify-center w-full">
        <app-minigame-timer
          [targetSec]="$any(task())?.['targetSec'] ?? 5"
          (submitted)="onSubmitTimer($event)"
        />
      </div>
      <div class="shrink-0 px-4 py-3 w-full">
        <button (click)="skipRound.emit()" class="w-full bg-neutral-200 text-neutral-700 py-2.5 rounded-xl font-semibold active:scale-95 transition-transform">Uberspringen</button>
      </div>
    }
    @case ('shape-split') {
      <div class="flex-1 flex flex-col items-center justify-center w-full">
        <app-minigame-shape-split
          [targetLabel]="'50:50'"
          (submitted)="onSubmitShapeSplit($event)"
        />
      </div>
      <div class="shrink-0 px-4 py-3 w-full">
        <button (click)="skipRound.emit()" class="w-full bg-neutral-200 text-neutral-700 py-2.5 rounded-xl font-semibold active:scale-95 transition-transform">Uberspringen</button>
      </div>
    }
    @default {
      <div class="flex-1 flex items-center justify-center text-neutral-400 text-sm">
        <p>Kein Minigame konfiguriert</p>
      </div>
    }
  }
</div>
