<!-- Prompt banner -->
<div animOnInit="banner" class="bg-stone-600 text-white px-4 py-2 text-center shrink-0">
  <span class="text-xs font-medium opacity-80">Runde {{ stickerService.currentRoundIndex() }}</span>
  <h2 class="text-base font-bold">{{ stickerService.currentPrompt() }}</h2>
</div>

<!-- Shared editor (canvas + palette) -->
@if (stickerService.myHand()) {
  <app-sticker-editor
    #editor
    class="flex-1 min-h-0"
    [paletteStickers]="handStickers()"
    [stickerCatalog]="stickerService.stickerCatalog()"
    [maxStickers]="stickerService.maxStickersOnCanvas()"
  />
} @else {
  <div class="flex-1 flex items-center justify-center gap-2 text-stone-400 text-xs">
    <div class="w-4 h-4 border-2 border-stone-200 border-t-stone-400 rounded-full animate-spin"></div>
    Sticker werden geladen...
  </div>
}

<!-- Footer: skip + submit -->
<div class="shrink-0 border-t border-black/10 bg-white px-4 py-3 flex items-center gap-3">
  <button
    class="text-[11px] text-stone-300 hover:text-stone-400 transition-colors"
    (click)="stickerService.skipRound()"
  >Überspringen</button>
  <button
    class="flex-1 bg-purple-600 text-white py-2.5 rounded-xl font-semibold shadow-lg active:scale-95 transition-transform disabled:opacity-40 disabled:active:scale-100"
    [disabled]="placements.length === 0"
    (click)="submitCollage()"
  >Einreichen 🚀</button>
</div>
