<div class="flex-1 flex flex-col items-center justify-center px-6 text-center" animOnInit="item">
  <div class="text-5xl">✅</div>
  <p class="mt-2 text-base font-semibold text-emerald-700">Stimme abgegeben</p>

  @if (!allVotingDone()) {
    <p class="mt-1 text-sm text-stone-500">Warte auf die anderen Spieler...</p>
    <div class="mt-3 text-2xl animate-pulse">⏳</div>
  } @else {
    <p class="mt-1 text-sm text-stone-500">Alle sind fertig. Ihr könnt zur Auswertung wechseln.</p>
    <button
      class="mt-4 w-full max-w-xs bg-purple-600 text-white py-2.5 rounded-xl font-semibold shadow-lg active:scale-95 transition-transform"
      (click)="endVotingEarly.emit()"
    >
      Abstimmung beenden ⏭️
    </button>
  }
</div>
