<app-player-status-screen
  icon="icon-checkmark-lg"
  title="Stimme abgegeben"
  [subtitle]="allVotingDone() ? 'Alle sind fertig. Ihr könnt zur Auswertung wechseln.' : 'Warte auf die anderen Spieler...' "
>
  @if (allVotingDone()) {
    <button
      class="mt-4 w-full max-w-xs bg-black text-white py-2.5 rounded-xl font-semibold shadow-lg active:scale-95 transition-transform"
      (click)="endVotingEarly.emit()"
    >
      Abstimmung beenden
    </button>
  }
</app-player-status-screen>
