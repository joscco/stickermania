<div class="flex-1 flex flex-col items-center justify-center px-6 text-center" animOnInit="opacity">
  <app-icon name="checkmark" size="lg" class="text-stone-900 mb-2"/>
  <p class="mt-2 text-base font-semibold text-stone-800">Stimme abgegeben</p>

  @if (!allVotingDone()) {
    <p class="mt-1 text-sm text-stone-500">Warte auf die anderen Spieler...</p>
    <div class="mt-3 w-6 h-6 border-2 border-stone-200 border-t-stone-400 rounded-full animate-spin mx-auto"></div>
  } @else {
    <p class="mt-1 text-sm text-stone-500">Alle sind fertig. Ihr könnt zur Auswertung wechseln.</p>
    <button
      class="mt-4 w-full max-w-xs bg-black text-white py-2.5 rounded-xl font-semibold shadow-lg active:scale-95 transition-transform"
      (click)="endVotingEarly.emit()"
    >
      Abstimmung beenden
    </button>
  }
</div>
