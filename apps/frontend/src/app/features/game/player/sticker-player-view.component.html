<div class="h-full flex flex-col overflow-hidden">
  @switch (stickerService.phase()) {
    @case ("LOBBY") {
      <app-player-lobby />
    }
    @case ("BUILDING") {
      <app-player-building />
    }
    @case ("VOTING") {
      <app-player-voting />
    }
    @case ("RESULTS") {
      <app-player-results />
    }
    @case ("NEXT_ROUND_SETUP") {
      <app-player-next-round />
    }
  }
</div>
