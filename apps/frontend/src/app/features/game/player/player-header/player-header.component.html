<div class="sticky top-0 z-30 text-black bg-white/20 backdrop-blur-xs">
  <div class="mx-auto w-full px-4 py-2">
    <div class="flex items-center justify-between gap-2">
      <div class="flex items-center gap-2 min-w-0">
        <img src="assets/svg/logo.svg" alt="Stickermania" class="h-6 w-auto shrink-0"/>
      </div>

      <div class="flex items-center justify-center gap-2 shrink-0">
        @if (vm().showEditControls) {
          <button
            class="text-black text-xs hover:text-neutral-600 transition-colors truncate"
            (click)="editName.emit()"
            title="Name ändern"
          >{{ vm().playerName }}
          </button>
          <button
            class="w-6 h-6 rounded-md flex items-center justify-center overflow-hidden bg-neutral-100 text-[10px] text-neutral-500 transition-colors"
            (click)="editAvatar.emit()"
            title="Avatar ändern"
          >
            @if (vm().avatarUrl; as avatarUrl) {
              <img class="w-full h-full object-cover" [src]="avatarUrl" alt="Avatar"/>
            } @else {
              <span>?</span>
            }
          </button>
        }
      </div>
    </div>
  </div>
</div>
