<div class="px-3 py-2">
  <div class="flex items-center justify-between mb-1.5">
    <span class="text-xs font-semibold text-stone-500">Deine Sticker</span>
    @if (!canAddMore) {
      <span class="text-xs text-red-400 font-medium">Max erreicht</span>
    }
  </div>
  <div class="flex gap-2 overflow-x-auto pb-1">
    @for (stickerId of hand.stickerIds; track $index) {
      <div
        #stickerCard
        class="relative shrink-0 w-14 h-14 rounded-lg border-2 flex items-center justify-center bg-white transition-all select-none"
        [class.border-purple-300]="canAddMore"
        [class.border-stone-200]="!canAddMore"
        [class.opacity-50]="!canAddMore"
        [class.cursor-grab]="canAddMore"
        (pointerdown)="onPointerDown($event)"
        (pointermove)="onPointerMove($event, stickerId, stickerCard)"
        (pointerup)="onPointerUp($event, stickerId)"
        (pointercancel)="onPointerUp($event, stickerId)"
      >
        <img
          [src]="getStickerUrl(stickerId)"
          [alt]="stickerId"
          class="w-10 h-10 object-contain pointer-events-none select-none"
          draggable="false"
        />
      </div>
    }
  </div>
</div>
