<div class="h-full flex flex-col">
  <div class="flex-1 flex items-center justify-center p-4">
    <div animGroup="opacity" class="w-full max-w-sm">
      <div animOnInit="opacity" class="text-center mb-6">
        <app-svg name="icon-cake-lg" w="70" class="mx-auto mb-2"/>
        <h1 class="text-xl font-bold">Hey!</h1>
        <p class="text-sm text-stone-500 mt-1">Gib deinen Namen ein, um mitzuspielen</p>
      </div>
      <input
        animOnInit="opacity"
        class="w-full rounded-2xl border border-black/[0.06] bg-white px-4 py-3 text-center text-lg outline-none focus:border-stone-400 transition-colors"
        type="text"
        inputmode="text"
        maxlength="24"
        placeholder="Dein Name"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        autofocus
        [value]="nameInput()"
        (input)="onNameInput($event)"
        (keydown.enter)="submit()"
      />
      <button
        animOnInit="opacity"
        class="mt-3 w-full rounded-2xl bg-stone-900 text-white px-4 py-3 text-sm font-medium hover:bg-stone-800 active:translate-y-px disabled:opacity-40"
        [disabled]="nameInput().trim().length === 0"
        (click)="submit()"
      >
        Weiter →
      </button>
    </div>
  </div>
</div>
