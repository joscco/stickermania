<div animGroup="item" class="h-full flex flex-col items-center justify-center p-4">
  <div animOnInit="item" class="text-center mb-3">
    <h2 class="text-lg font-bold">Zeichne deinen Avatar</h2>
    <p class="text-xs text-stone-500">{{ playerName() }}, mal dich selbst!</p>
  </div>

  <app-drawing-canvas
    animOnInit="item"
    #drawingCanvas
    [initialImage]="initialAvatarImage()"
    (submitted)="avatarSubmitted.emit($event)"
  />

  <div animOnInit="item" class="flex gap-2 mt-3 items-center">
    <button class="rounded-xl border border-black/10 bg-white px-4 py-2 text-sm hover:bg-stone-50" (click)="clear()">LÖSCHEN</button>
    <button class="h-12 transition-transform hover:scale-105 active:translate-y-px" (click)="submit()">
      <svg class="h-full w-auto" aria-label="Fertig"><use href="assets/sprite.svg#draw-btn-ready"/></svg>
    </button>
  </div>
  <button animOnInit="item" class="mt-2 text-xs text-stone-400 hover:text-stone-600 underline" (click)="skipped.emit()">ÜBERSPRINGEN</button>
</div>
