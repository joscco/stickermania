<div animGroup="opacity" class="h-full grid overflow-hidden p-4" style="grid-template-rows: auto minmax(0, 1fr) auto;">

  <!-- Title -->
  <div animOnInit="opacity" class="text-center py-1.5">
    <h2 class="text-lg font-bold">Zeichne deinen Avatar</h2>
    <p class="text-xs text-neutral-500">{{ playerName() }}, mal dich selbst!</p>
  </div>

  <!-- Canvas area: fills grid cell, canvas uses cqmin to stay square -->
  <div class="min-h-0 w-full"
       style="container-type: size; overflow: hidden; display: grid; place-items: center;">
    <app-drawing-canvas
      animOnInit="opacity"
      #drawingCanvas
      style="width: 100cqmin;"
      [initialImage]="initialAvatarImage()"
      [drawMode]="drawMode()"
      (submitted)="avatarSubmitted.emit($event)"
    />
  </div>

  <!-- Buttons -->
  <div class="flex flex-col items-center gap-1 w-full max-w-md place-self-center">
    <!-- Brush buttons -->
    <div animOnInit="opacity" class="flex items-center justify-center">
      <button class="flex items-center justify-center rounded-full transition-all p-1 scale-90"
              [class.bg-white]="drawMode() === 'small'"
              [class.scale-100]="drawMode() === 'small'"
              (click)="selectThinBrush()">
        <app-svg name="icon-draw-btn-small-lg" w="48"/>
      </button>

      <button class="flex items-center justify-center rounded-full transition-all p-1 scale-90"
              [class.bg-white]="drawMode() === 'big'"
              [class.scale-100]="drawMode() === 'big'"
              (click)="selectThickBrush()">
        <app-svg name="icon-draw-btn-big-lg" w="48"/>
      </button>

      <button class="flex items-center justify-center rounded-full transition-all p-1 scale-90"
              [class.bg-white]="drawMode() === 'erase'"
              [class.scale-100]="drawMode() === 'erase'"
              (click)="selectEraser()">
        <app-svg name="icon-draw-btn-eraser-lg" w="48"/>
      </button>
    </div>

    <!-- Action buttons -->
    <div class="flex items-center justify-center w-full gap-2 pt-2">
      <button
        class="flex-1 rounded-2xl bg-neutral-300 text-neutral-700 px-4 py-3 text-sm font-medium hover:bg-neutral-400 active:translate-y-px transition-colors"
        (click)="skip()">
        Nicht jetzt...
      </button>
      <button
        class="flex-1 rounded-2xl bg-neutral-50 text-neutral-700 px-4 py-3 text-sm font-medium hover:bg-neutral-300 active:translate-y-px transition-colors"
        (click)="clear()">
        Leeren
      </button>
      <button
        class="flex-1 rounded-2xl bg-neutral-900 text-white px-4 py-3 text-sm font-medium hover:bg-neutral-800 active:translate-y-px transition-colors"
        (click)="submit()">
        Fertig!
      </button>

    </div>
  </div>
</div>
