<div animGroup="opacity" class="h-full flex flex-col items-center justify-center p-6">
  <!--- TODO: Das hier muss einfacher gehen! -->
  <div class="flex flex-col" style="--sz: min(95vw, calc(100dvh - 260px)); --btn-h: calc(var(--sz) * 0.14); width: var(--sz);">
    <div animOnInit="opacity" class="text-center mt-3">
      <h2 class="text-lg font-bold">Zeichne deinen Avatar</h2>
      <p class="text-xs text-stone-500">{{ playerName() }}, mal dich selbst!</p>
    </div>

    <app-drawing-canvas
      animOnInit="opacity"
      #drawingCanvas
      class="w-full"
      [initialImage]="initialAvatarImage()"
      [drawMode]="drawMode()"
      (submitted)="avatarSubmitted.emit($event)"
    />

    <div class="flex flex-col gap-2 items-center justify-center">
      <!-- Single button row — all buttons same height, widths from SVG viewBox -->
      <div animOnInit="opacity" class="flex items-center justify-center gap-2 w-full" style="height: var(--btn-h);">

        <button class="h-full flex-none rounded-full transition-all"
                [class.bg-stone-200]="drawMode() === 'small'"
                [class.scale-110]="drawMode() === 'small'"
                (click)="selectThinBrush()">
          <svg viewBox="0 0 700 700" style="height:100%;width:auto;display:block;" aria-hidden="true">
            <use href="assets/sprite.svg#icon-draw-btn-small-lg"/>
          </svg>
        </button>

        <button class="h-full flex-none rounded-full transition-all"
                [class.bg-stone-200]="drawMode() === 'big'"
                [class.scale-110]="drawMode() === 'big'"
                (click)="selectThickBrush()">
          <svg viewBox="0 0 700 700" style="height:100%;width:auto;display:block;" aria-hidden="true">
            <use href="assets/sprite.svg#icon-draw-btn-big-lg"/>
          </svg>
        </button>

        <button class="h-full flex-none rounded-full transition-all"
                [class.bg-stone-200]="drawMode() === 'erase'"
                [class.scale-110]="drawMode() === 'erase'"
                (click)="selectEraser()">
          <svg viewBox="0 0 700 700" style="height:100%;width:auto;display:block;" aria-hidden="true">
            <use href="assets/sprite.svg#icon-draw-btn-eraser-lg"/>
          </svg>
        </button>
      </div>

      <div class="flex items-center justify-center w-full" style="height: var(--btn-h);">
        <button class="h-full flex-none transition-transform hover:scale-105 active:translate-y-px"
                (click)="clear()">
          <svg viewBox="0 0 1600 700" style="height:100%;width:auto;display:block;" aria-hidden="true">
            <use href="assets/sprite.svg#draw-btn-new"/>
          </svg>
        </button>

        <button class="h-full flex-none transition-transform hover:scale-105 active:translate-y-px"
                (click)="submit()">
          <svg viewBox="0 0 2000 700" style="height:100%;width:auto;display:block;" aria-hidden="true">
            <use href="assets/sprite.svg#draw-btn-complete"/>
          </svg>
        </button>

      </div>
      <button animOnInit="opacity" class="mb-2 text-xs text-stone-400 hover:text-stone-600 underline"
              (click)="skipped.emit()">
        ÜBERSPRINGEN
      </button>
    </div>
  </div>
</div>
