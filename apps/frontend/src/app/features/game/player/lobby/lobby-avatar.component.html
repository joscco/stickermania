<div animGroup="opacity" class="h-full flex flex-col items-center justify-center overflow-hidden px-4 py-2">

  <!-- Title -->
  <div #titleRef animOnInit="opacity" class="text-center shrink-0 py-1.5">
    <h2 class="text-lg font-bold">Zeichne deinen Avatar</h2>
    <p class="text-xs text-stone-500">{{ playerName() }}, mal dich selbst!</p>
  </div>

  <!-- Canvas: square sized by JS computation -->
  <app-drawing-canvas
    animOnInit="opacity"
    #drawingCanvas
    class="shrink-0"
    [style.width.px]="canvasSide()"
    [style.height.px]="canvasSide()"
    [initialImage]="initialAvatarImage()"
    [drawMode]="drawMode()"
    (submitted)="avatarSubmitted.emit($event)"
  />

  <!-- Buttons -->
  <div #buttonsRef class="shrink-0 flex flex-col items-center gap-1 w-full max-w-md">
    <!-- Brush buttons -->
    <div animOnInit="opacity" class="flex items-center justify-center">
      <button class="flex items-center justify-center rounded-full transition-all p-1 scale-90"
              [class.bg-stone-200]="drawMode() === 'small'"
              [class.scale-100]="drawMode() === 'small'"
              (click)="selectThinBrush()">
        <app-svg name="icon-draw-btn-small-lg" [w]="brushSize()"/>
      </button>

      <button class="flex items-center justify-center rounded-full transition-all p-1 scale-90"
              [class.bg-stone-200]="drawMode() === 'big'"
              [class.scale-100]="drawMode() === 'big'"
              (click)="selectThickBrush()">
        <app-svg name="icon-draw-btn-big-lg" [w]="brushSize()"/>
      </button>

      <button class="flex items-center justify-center rounded-full transition-all p-1 scale-90"
              [class.bg-stone-200]="drawMode() === 'erase'"
              [class.scale-100]="drawMode() === 'erase'"
              (click)="selectEraser()">
        <app-svg name="icon-draw-btn-eraser-lg" [w]="brushSize()"/>
      </button>
    </div>

    <!-- Action buttons -->
    <div class="flex items-center justify-center w-full gap-2 pt-2">
      <button class="max-w-1/2 h-10 transition-transform hover:scale-105 active:translate-y-px"
              (click)="clear()">
        <svg viewBox="0 0 1600 700" style="height:100%;width:100%;display:block;" aria-hidden="true">
          <use href="#draw-btn-new"/>
        </svg>
      </button>

      <button class="max-w-1/2 h-10 transition-transform hover:scale-105 active:translate-y-px"
              (click)="submit()">
        <svg viewBox="0 0 2000 700" style="height:100%;width:100%;display:block;" aria-hidden="true">
          <use href="#draw-btn-complete"/>
        </svg>
      </button>
    </div>

    <button animOnInit="opacity" class="text-xs text-stone-400 hover:text-stone-600 underline pt-2"
            (click)="skipped.emit()">
      Überspringen
    </button>
  </div>
</div>
