<div class="sticky top-0 z-30 text-black bg-white backdrop-blur">
  <div class="mx-auto w-full max-w-lg px-3 py-2">
    <div class="flex items-center justify-between gap-2">
      <div class="flex items-center gap-2 min-w-0">
        <span class="text-xs font-semibold shrink-0">Stickermania</span>
      </div>

      <!-- Countdown bar — animates in/out -->
      <div class="flex-1 px-2" [animPresence]="timerEndsAt() > 0" animPresenceType="opacity">
        <app-countdown-bar
          [endsAt]="timerEndsAt()"
          [totalDurationSec]="timerTotalSec()"
        />
      </div>

      <div class="flex items-center justify-center gap-2 shrink-0">
        @if (vm().showEditControls) {
          <button
            class="text-black text-xs hover:text-stone-600 transition-colors truncate"
            (click)="editName.emit()"
            title="Name ändern"
          >{{ vm().playerName }}
          </button>
          <button
            class="w-6 h-6 rounded-md flex items-center justify-center overflow-hidden bg-stone-100 text-[10px] text-stone-500 transition-colors"
            (click)="editAvatar.emit()"
            title="Avatar ändern"
          >
            @if (vm().avatarUrl; as avatarUrl) {
              <img class="w-full h-full object-cover" [src]="avatarUrl" alt="Avatar"/>
            } @else {
              <span>?</span>
            }
          </button>
        }
      </div>
    </div>
  </div>
</div>
