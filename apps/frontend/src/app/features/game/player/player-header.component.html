<div class="sticky top-0 z-30 text-black bg-stone-200 backdrop-blur">
  <div class="mx-auto w-full max-w-lg px-3 pt-2 pb-1">
    <div class="flex items-center justify-between gap-2">
      <div class="flex items-center gap-2 min-w-0">
        <span class="text-sm font-semibold shrink-0">Stickermania</span>
      </div>

      <div class="flex items-center gap-2 shrink-0">
        @if (vm().showEditControls) {
          <button
            class="text-black hover:text-stone-600 transition-colors truncate"
            (click)="editName.emit()"
            title="Name ändern"
          >{{ vm().playerName }}
          </button>
          <button
            class="w-6 h-6 rounded-full flex items-center justify-center overflow-hidden bg-stone-100 text-[10px] text-stone-500 transition-colors"
            (click)="editAvatar.emit()"
            title="Avatar ändern"
          >
            @if (vm().avatarUrl; as avatarUrl) {
              <img class="w-full h-full object-cover" [src]="avatarUrl" alt="Avatar"/>
            } @else {
              <span>?</span>
            }
          </button>
        }
      </div>
    </div>
  </div>

  <!-- Countdown bar — full width -->
  <div class="px-2 pb-1.5">
    <app-countdown-bar
      [endsAt]="timerEndsAt()"
      [totalDurationSec]="timerTotalSec()"
    />
  </div>
</div>
