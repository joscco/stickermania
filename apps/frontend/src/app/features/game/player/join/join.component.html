<div pageRoot class="min-h-dvh bg-stone-100 flex flex-col">
  <div class="flex-1 flex items-center justify-center px-4">
    <div animOnInit="item" class="w-full max-w-md rounded-3xl bg-white border border-black/5 shadow-sm p-6 text-center">
      <div class="text-2xl font-bold text-stone-900">Session beitreten</div>
      <p class="mt-2 text-sm text-stone-500">
        Gib den Session-Code vom Board ein.
      </p>

      <div
        class="mt-6 w-full rounded-2xl border border-black/10 px-4 py-4 text-center text-2xl tracking-[0.3em] uppercase min-h-[3.5rem] flex items-center justify-center bg-white"
      >
        <span class="whitespace-pre">{{ sessionCode() || '' }}</span>
        <span class="animate-pulse text-stone-300">|</span>
      </div>

      <button
        class="mt-4 w-full rounded-2xl bg-stone-900 text-white px-4 py-3 text-sm font-medium hover:bg-stone-800"
        (click)="continue()"
      >
        Beitreten
      </button>

      @if (lastSessionCode()) {
        <button
          class="mt-3 text-sm text-stone-500 underline"
          (click)="useLastSession()"
        >
          Letzte Session {{ lastSessionCode() }} verwenden
        </button>
      }
    </div>
  </div>

  <app-on-screen-keyboard
    mode="code"
    [value]="sessionCode()"
    [maxLength]="4"
    (valueChange)="onKeyboardInput($event)"
  />
</div>
