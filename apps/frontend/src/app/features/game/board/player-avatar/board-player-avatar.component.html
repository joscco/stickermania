<div class="flex flex-col items-center gap-1.5"
     [class.opacity-40]="dimmed()">

  <!-- Avatar ring + image/fallback + badge -->
  <div class="relative">
    <div [class]="sizeClasses + ' bg-stone-100 shadow-md overflow-hidden grid place-items-center ' + borderClass()">
      @if (player().avatarUrl) {
        <img [src]="player().avatarUrl"
             [alt]="player().name"
             class="w-full h-full object-cover"
             (error)="$any($event.target).style.display='none'" />
      } @else {
        <span>?</span>
      }
    </div>

    <!-- Medal overlay (podium — derived from status) -->
    @if (medalSpriteId(); as spriteId) {
      <div class="absolute -top-4 -right-4">
        <svg class="w-8 h-8" aria-hidden="true"><use [attr.href]="'assets/sprite.svg#' + spriteId"/></svg>
      </div>
    } @else if (badge(); as b) {
      <div class="absolute -top-1 -right-1 w-5 h-5 rounded-full grid place-items-center text-white shadow"
           [ngClass]="b.bg"
           [class.animate-pulse]="b.animate">
        <svg class="w-3 h-3" aria-hidden="true"><use [attr.href]="'assets/sprite.svg#' + b.spriteId"/></svg>
      </div>
    }
  </div>

  <!-- Name -->
  <span class="text-xs font-medium truncate max-w-14 text-stone-600">
    {{ player().name || 'Spieler' }}
  </span>
</div>
