<div class="flex flex-col items-center gap-1.5"
     [class.opacity-40]="dimmed()">

  <!-- Avatar ring + image/fallback + badge -->
  <div class="relative">
    <div [class]="sizeClasses + ' bg-stone-100 shadow-md overflow-hidden grid place-items-center ' + borderClass()">
      @if (player().avatarUrl) {
        <img [src]="player().avatarUrl"
             [alt]="player().name"
             class="w-full h-full object-cover"
             (error)="$any($event.target).style.display='none'" />
      } @else {
        <span>?</span>
      }
    </div>

    <!-- Medal overlay (podium — derived from status) -->
    @if (badge(); as b) {
      <div class="absolute -top-2.5 -right-2.5 w-8 h-8 rounded-full grid place-items-center text-white shadow"
           [ngClass]="b.bg"
           [class.animate-pulse]="b.animate">

        <app-svg [name]="b.spriteId" w="20"/>
      </div>
    }
  </div>

  <!-- Name -->
  <span class="text-xs font-medium max-w-14 text-stone-600">
    {{ player().name || 'Spieler' }}
  </span>
</div>
