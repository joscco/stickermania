<div class="min-h-dvh lobby-pattern-bg flex flex-col items-center justify-center px-4">

  <!-- Logo -->
  <img src="assets/svg/logo.svg" alt="Stickermania" class="w-full max-w-lg mx-auto mb-4"/>

  <div animOnInit="opacity" class="w-full max-w-sm rounded-3xl bg-neutral-600 shadow-sm p-4 text-center mb-5">

    <p class="text-sm text-neutral-300 leading-relaxed mb-5">
      Gib zum Mitspielen den Session-Code ein:
    </p>

    <div class="flex items-center justify-center gap-2" [class.ui-shake]="sessionCodeShakeActive()">
      @for (index of digitSlots; track index) {
        <input
          #codeInput
          class="h-14 w-14 rounded-xl border border-neutral-500 bg-neutral-700 text-center text-2xl text-neutral-100 outline-none focus:border-neutral-300 placeholder-neutral-400"
          type="text"
          inputmode="numeric"
          maxlength="1"
          autocomplete="false"
          autocorrect="off"
          spellcheck="false"
          [value]="codeDigits()[index]"
          (input)="onCodeDigitInput(index, $event)"
          (keydown)="onCodeDigitKeydown(index, $event)"
          (paste)="onCodePaste(index, $event)"
        />
      }
    </div>

    <button
      class="mt-4 w-full rounded-2xl bg-white text-neutral-900 px-4 py-3 text-sm font-medium hover:bg-neutral-200 disabled:opacity-40 transition-all"
      [disabled]="sessionCode().length < 4 || sessionJoinLoading()"
      (click)="joinSession()"
    >
      Beitreten
    </button>
  </div>

  <button
    class="bg-black/50 hover:bg-black text-xs text-neutral-300/50 hover:text-neutral-300 transition-colors p-4 w-full max-w-75 rounded-2xl "
    (click)="goToBoard()"
  >
    → Als Moderator zum Board
  </button>
</div>

<!-- Password dialog -->
<div
  class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm px-4"
  [animPresence]="showPasswordDialog()"
  animPresenceType="overlay"
  (click)="cancelPasswordDialog()"
>
  <div
    class="w-full max-w-sm rounded-3xl bg-neutral-600 shadow-2xl p-6"
    [animPresence]="showPasswordDialog()"
    animPresenceType="opacity"
    [class.ui-shake]="passwordShakeActive()"
    (click)="$event.stopPropagation()"
  >
    <div class="text-lg font-bold text-neutral-100">Board-Zugang</div>
    <p class="mt-1 text-sm text-neutral-400">Bitte das Board-Passwort eingeben.</p>

    <input
      class="mt-4 w-full rounded-2xl border border-neutral-500 bg-neutral-700 px-4 py-3 text-sm text-neutral-100 outline-none focus:border-neutral-300 placeholder-neutral-500"
      type="password"
      placeholder="Passwort"
      autocomplete="false"
      autocorrect="off"
      [value]="boardPassword()"
      (input)="boardPassword.set($any($event.target).value)"
      (keydown.enter)="submitPassword()"
    />

    <div class="mt-4 flex gap-2">
      <button
        class="flex-1 rounded-2xl border border-neutral-500 bg-neutral-700 px-4 py-2 text-sm text-neutral-200 hover:bg-neutral-600 transition-colors"
        (click)="cancelPasswordDialog()"
      >
        Abbrechen
      </button>
      <button
        class="flex-1 rounded-2xl bg-white text-neutral-900 px-4 py-2 text-sm font-medium hover:bg-neutral-200 disabled:opacity-40 transition-all"
        [disabled]="passwordLoading()"
        (click)="submitPassword()"
      >
        Weiter
      </button>
    </div>
  </div>
</div>
