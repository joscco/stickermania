<div animGroup="opacity" class="h-full flex flex-col items-center justify-center gap-8">
  <!-- Title -->
  <div animOnInit="opacity" class="text-center">
    <h1 class="text-5xl font-black text-stone-800">Stickermania</h1>
  </div>

  <!-- Connected players -->
  <div animOnInit="opacity" class="flex flex-wrap justify-center gap-3 max-w-2xl">
    @for (player of connectedPlayers(); track player.id) {
      <app-board-player-avatar
        [player]="player"
        [status]="player.connected ? 'connected' : 'offline'"
      />
    }
  </div>

  <p animOnInit="opacity" class="text-xl text-stone-500">{{ connectedPlayers().length }} Spieler verbunden</p>

  <!-- Start button -->
  <button
    animOnInit="opacity"
    class="bg-black text-white px-10 py-5 rounded-2xl text-2xl font-bold shadow-xl hover:bg-stone-800 active:scale-95 transition-[background-color,box-shadow]"
    (click)="startGame.emit()"
  >
    Spiel starten
  </button>
</div>
