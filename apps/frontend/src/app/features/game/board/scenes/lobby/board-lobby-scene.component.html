<div animGroup="opacity" class="h-full flex flex-col items-center justify-center gap-8">
  <!-- Title -->
  <div animOnInit="opacity" class="text-center">
    <img src="assets/svg/logo.svg" alt="Stickermania" class="w-full max-w-md"/>
  </div>

  <!-- Connected players -->
  <div animOnInit="opacity" class="flex flex-wrap justify-center gap-3 max-w-2xl">
    @for (player of connectedPlayers(); track player.id) {
      <app-board-player-avatar
        [player]="player"
        [status]="player.connected ? 'connected' : 'offline'"
      />
    }
  </div>

  <p animOnInit="opacity" class="text-xl text-neutral-500">{{ connectedPlayers().length }} Spieler verbunden</p>

  <!-- Shared hand toggle -->
  <button
    animOnInit="opacity"
    class="flex items-center gap-3 px-4 py-2 rounded-xl border text-sm transition-colors"
    [class.bg-neutral-100]="!sharedHand()"
    [class.border-neutral-300]="!sharedHand()"
    [class.text-neutral-500]="!sharedHand()"
    [class.bg-yellow-50]="sharedHand()"
    [class.border-yellow-300]="sharedHand()"
    [class.text-yellow-700]="sharedHand()"
    (click)="toggleSharedHand.emit()"
  >
    <span class="w-5 h-5 rounded border-2 flex items-center justify-center text-xs font-bold"
          [class.border-neutral-400]="!sharedHand()"
          [class.text-neutral-400]="!sharedHand()"
          [class.border-yellow-500]="sharedHand()"
          [class.bg-yellow-400]="sharedHand()"
          [class.text-white]="sharedHand()"
    >{{ sharedHand() ? '✓' : '' }}</span>
    Gleiche Sticker für alle Spieler
  </button>

  <!-- Start button -->
  <button
    animOnInit="opacity"
    class="bg-black text-white px-10 py-5 rounded-2xl text-2xl font-bold shadow-xl hover:bg-neutral-800 active:scale-95 transition-[background-color,box-shadow]"
    (click)="startGame.emit()"
  >
    Spiel starten
  </button>
</div>
