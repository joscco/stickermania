<div class="h-full flex flex-col">
  <app-round-info
    [roundIndex]="gameState()?.currentRoundIndex ?? 0"
    [title]="gameState()?.currentPrompt ?? ''"
    [task]="$any(gameState())?.currentTask ?? null"
  />

  <!-- Player status -->
  <div class="flex-1 flex flex-col items-center justify-center px-8">
    <div animOnInit="players" [animDelay]="0.2" class="flex flex-wrap justify-center gap-4 max-w-3xl">
      @for (player of roundParticipants(); track player.id) {
        <app-board-player-avatar
          [player]="player"
          [status]="playerStatus(player.id)"
        />
      }
    </div>

    <div animOnInit="opacity" [animDelay]="0.35" class="mt-8 text-center">
      <p class="text-lg font-medium text-neutral-600">{{ submissionCount() }}/{{ roundParticipants().length }} eingereicht</p>
    </div>
  </div>

  <!-- End round button -->
  <div animOnInit="opacity" [animDelay]="0.45" class="text-center pb-6">
    <button
      class="bg-black text-white px-8 py-3 rounded-xl text-lg font-semibold shadow-lg hover:bg-neutral-800 active:scale-95 transition-[background-color,box-shadow]"
      (click)="endRoundEarly.emit()"
    >
      Runde beenden
    </button>
  </div>
</div>
