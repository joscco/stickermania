@if (isOpen()) {
  <button
    type="button"
    class="fixed inset-0 z-40 bg-black/20 backdrop-blur-sm"
    (click)="requestClose()"
    aria-label="Close setup drawer"
  ></button>
}

<div
  class="fixed right-0 top-0 z-50 h-full w-[min(420px,92vw)] translate-x-full border-l border-black/[0.06] bg-white shadow-xl backdrop-blur
         transition-[transform,visibility] duration-300 ease-out"
  [class.translate-x-full]="!isOpen()"
  [class.translate-x-0]="isOpen()"
  [class.invisible]="!isOpen()"
  [class.visible]="isOpen()"
>
  <div class="flex h-full flex-col">
    <div class="flex items-center justify-between gap-3 border-b border-black/[0.06] px-4 py-3">
      <div>
        <div class="text-sm font-semibold text-stone-900">Einstellungen</div>
        <div class="mt-0.5 text-xs text-stone-400">QR, Links & Session-Verwaltung</div>
      </div>

      <button
        class="rounded-xl border border-black/10 bg-stone-50 px-3 py-2 text-sm hover:bg-stone-100 active:translate-y-px"
        (click)="requestClose()"
      >
        Schließen
      </button>
    </div>

    <!-- Content -->
    <div class="flex-1 overflow-auto px-4 py-4">
      <!-- Join link -->
      @if (playerUrl()) {
        <div class="rounded-2xl border border-black/[0.06] bg-stone-50 p-3">
          <div class="text-sm font-semibold text-stone-900">Mitspielen-Link</div>
          <div class="mt-0.5 text-xs text-stone-400 break-all">{{ playerUrl() }}</div>
        </div>
      }

      <!-- Danger zone (admin only) -->
      @if (canReset()) {
        <div class="mt-3 rounded-2xl border border-red-200 bg-red-50/50 p-3">
          <div class="text-sm font-semibold text-red-700">Gefahrenzone</div>
          <div class="mt-0.5 text-xs text-red-400">Aktionen können nicht rückgängig gemacht werden.</div>

          <div class="mt-3 flex gap-2">
            <button
              class="flex-1 rounded-xl border border-red-200 bg-white px-3 py-2 text-sm text-red-600 hover:bg-red-50 active:translate-y-px"
              (click)="resetRequested.emit()"
            >
              🔄 Runde zurücksetzen
            </button>
            <button
              class="flex-1 rounded-xl border border-red-300 bg-red-600 px-3 py-2 text-sm text-white hover:bg-red-700 active:translate-y-px"
              (click)="deleteRequested.emit()"
            >
              <img src="assets/icons/trash.svg" class="w-3.5 h-3.5 inline brightness-0 invert" alt=""/> Session löschen
            </button>
          </div>
        </div>
      }
    </div>
  </div>
</div>
