<div class="flex items-center justify-between gap-3 px-4 py-2 bg-white/80 border-b border-black/6 backdrop-blur shrink-0">
  @if (vm().hasSession) {
    <div class="flex items-center gap-3">
      <button
        class="w-8 h-8 flex items-center justify-center rounded-lg border border-black/10 bg-white p-2 text-stone-500 hover:bg-stone-50 transition-colors"
        (click)="backToLobby.emit()"
        title="Zurück zur Session-Lobby"
      >
        <app-svg name="icon-home-sm" w="20"/>
      </button>
      <span class="text-sm font-semibold text-stone-800">Stickermania</span>
    </div>
  } @else {
    <div></div>
  }

  <div class="flex items-center gap-2 text-xs text-stone-400">
    @if (vm().timeLeft) {
      <span class="rounded-lg bg-stone-100 px-2 py-1 font-mono text-stone-600">{{ vm().timeLeft }}</span>
    }
    <button
      class="h-8 flex items-center justify-center rounded-lg border border-black/10 bg-white px-3 text-stone-600 hover:bg-stone-50 gap-2"
      (click)="openSettings.emit()">
      <app-svg name="icon-settings-sm" w="20"/>
      Einstellungen
    </button>
  </div>
</div>
