<div class="flex flex-col shrink-0 bg-white backdrop-blur border-b border-black/6">
  <!-- Top row: branding + home button -->
  <div class="flex items-center justify-between gap-3 px-4 py-1">
    @if (vm().hasSession) {
      <div class="flex items-center gap-3">
        <button
          class="w-8 h-8 flex items-center justify-center rounded-lg border border-black/10 bg-white p-2 text-neutral-500 hover:bg-neutral-50 transition-colors"
          (click)="backToLobby.emit()"
          title="Zurück zur Session-Lobby"
        >
          <app-svg name="icon-home-sm" w="20"/>
        </button>
        <img src="assets/svg/logo.svg" alt="Stickermania" class="h-6 w-auto"/>
      </div>
    }
    <!-- Countdown bar — animates in/out -->
    <div class="flex-1 px-2" [animPresence]="timerEndsAt() > 0" animPresenceType="opacity">
      <app-countdown-bar
        [endsAt]="timerEndsAt()"
        [totalDurationSec]="timerTotalSec()"
      />
    </div>
    @if (vm().hasSession) {
      <button
        class="w-8 h-8 flex items-center justify-center rounded-lg border border-black/10 bg-white p-1.5 text-neutral-400 hover:text-neutral-600 hover:bg-neutral-50 transition-colors"
        (click)="toggleMusic.emit()"
        [title]="musicPlaying() ? 'Musik aus' : 'Musik an'"
      >
        <app-svg [name]="musicPlaying() ? 'icon-music' : 'icon-no-music'" w="18"/>
      </button>
    }
  </div>
</div>
