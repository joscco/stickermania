<!-- ── Großes Panel (Lobby) ─────────────────────────────────────────── -->
<div class="flex flex-col items-center gap-4">
  <!-- Session-Code -->
  <div class="text-center">
    <div class="text-xs uppercase tracking-widest text-stone-400 font-semibold">Session-Code</div>
    <div class="text-4xl font-black tracking-[0.25em] text-stone-900 mt-1">{{ sessionCode() }}</div>
  </div>

  <!-- QR-Codes -->
  @if (playerQrDataUrl() || wifiQrDataUrl()) {
    <div class="flex items-end gap-4">
      @if (playerQrDataUrl()) {
        <div class="flex flex-col items-center gap-1">
          <img [src]="playerQrDataUrl()!" alt="QR Mitspielen"
               class="w-32 h-32 rounded-2xl border border-black/10 bg-white p-1 shadow-lg"/>
          <div class="text-xs uppercase tracking-widest text-stone-400 font-semibold">Mitspielen</div>
        </div>
      }
      @if (wifiQrDataUrl()) {
        <div class="flex flex-col items-center gap-1">
          <img [src]="wifiQrDataUrl()!" alt="QR WLAN"
               class="w-32 h-32 rounded-2xl border border-black/10 bg-white p-1 shadow-lg"/>
          <div class="text-xs uppercase tracking-widest text-stone-400 font-semibold">WLAN</div>
        </div>
      }
    </div>
  }
</div>
