<div class="flex flex-col items-center gap-2">
  <!-- Session-Code -->
  <div class="text-center">
    <div class="text-xs uppercase tracking-widest text-stone-400 font-semibold">Session-Code</div>
    <div class="text-3xl font-black tracking-[0.25em] text-stone-900 mt-0.5">{{ sessionCode() }}</div>
  </div>

  <div class="flex items-center gap-4">
    <!-- QR-Codes -->
    @if (playerQrDataUrl()) {
      <div class="flex flex-col items-center gap-1">
        <img [src]="playerQrDataUrl()!" alt="QR Mitspielen"
             class="w-24 h-24 rounded-xl border border-black/10 bg-white p-1 shadow-sm"/>
        <div class="text-xs uppercase tracking-widest text-stone-400 font-semibold">Mitspielen</div>
      </div>
    }

    @if (wifiQrDataUrl()) {
      <div class="flex flex-col items-center gap-1">
        <img [src]="wifiQrDataUrl()!" alt="QR WLAN"
             class="w-24 h-24 rounded-xl border border-black/10 bg-white p-1 shadow-sm"/>
        <div class="text-xs uppercase tracking-widest text-stone-400 font-semibold">WLAN</div>
      </div>
    }
  </div>
</div>
