@if (isBootstrapping()) {
  <div class="h-screen w-screen grid place-items-center bg-white text-stone-500">
    <div class="text-center">
      <div class="mx-auto h-10 w-10 animate-spin rounded-full border-4 border-stone-300 border-t-stone-600"></div>
      <div class="mt-4 text-sm">Session wird geladen...</div>
    </div>
  </div>
} @else if (!isBoardReady()) {
  <app-board-lobby (sessionCreated)="onSessionSelected($event)"/>
} @else {
  <div class="h-screen w-screen overflow-hidden bg-white text-stone-900 relative flex flex-col">
    <!-- Thin header bar -->
    <div
      class="flex items-center justify-between gap-3 px-4 py-2 bg-white/80 border-b border-black/6 backdrop-blur shrink-0">
      @if (worldStore.sessionState()) {
        <div class="flex items-center gap-3">
          <button
            class="rounded-lg border border-black/10 bg-white p-2 text-stone-500 hover:bg-stone-50 transition-colors"
            (click)="backToLobby()"
            title="Zurück zur Session-Lobby"
          >
            <img src="assets/icons/home.svg" class="h-4 w-4" alt=""/>
          </button>
          <span class="text-sm font-semibold text-stone-800">Stickermania</span>
        </div>
      } @else {
        <div></div>
      }

      <div class="flex items-center gap-2 text-xs text-stone-400">
        @if (timeLeft()) {
          <span class="rounded-lg bg-stone-100 px-2 py-1 font-mono text-stone-600">{{ timeLeft() }}</span>
        }
        <button
          class="rounded-lg border border-black/10 bg-white px-3 py-2 text-stone-600 hover:bg-stone-50 inline-flex items-center gap-2"
          (click)="toggleSetupDrawer()">
          <img src="assets/icons/settings.svg" class="h-4 w-4" alt=""/> Einstellungen
        </button>
      </div>
    </div>

    <!-- Game scene (full remaining space, no sidebar) -->
    <div class="flex-1 relative overflow-hidden bg-white">
      <app-event-toasts [events]="events()"></app-event-toasts>

      @if (!worldStore.sessionState()) {
        <div class="h-full flex flex-col items-center justify-center gap-3 text-stone-400">
          <div class="h-8 w-8 animate-spin rounded-full border-4 border-stone-200 border-t-stone-500"></div>
          <span class="text-sm">Verbinde mit Session…</span>
        </div>
      } @else {
        <app-sticker-board-scene
          class="block h-full w-full"
          [sessionCode]="sessionCode()"
          [playerQrDataUrl]="playerQrDataUrl()"
          [wifiQrDataUrl]="wifiQrDataUrl()"
        />
      }
    </div>

    <app-board-setup-drawer
      [isOpen]="isSetupDrawerOpen()"
      [canReset]="true"
      [playerUrl]="playerUrl()"
      [playerQrDataUrl]="playerQrDataUrl()"
      (wifiQrGenerated)="handleWifiQrGenerated($event)"
      (onCloseRequested)="closeSetupDrawer()"
      (resetRequested)="resetSession()"
      (deleteRequested)="deleteSession()"
    />
  </div>
}
