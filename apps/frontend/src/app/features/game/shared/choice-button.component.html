<button
  class="w-full flex items-center gap-4 p-3.5 rounded-xl border-2 transition-all active:scale-[0.98]"
  [class.border-black]="checked()"
  [class.bg-stone-50]="checked()"
  [class.shadow-sm]="checked()"
  [class.border-stone-200]="!checked()"
  [class.bg-white]="!checked()"
  [class.hover:border-stone-400]="!checked()"
  (click)="selected.emit(id())"
>
  @if (iconId()) {
    <app-svg [name]="iconId()!" [w]="44" class="shrink-0"/>
  }
  <span class="text-sm font-medium text-stone-700 text-left flex-1">{{ label() }}</span>
  @if (checked()) {
    <app-svg name="icon-checkmark-sm" [w]="20" class="shrink-0"/>
  }
</button>
