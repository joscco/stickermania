<div
  #canvasArea
  class="w-full h-full relative overflow-hidden bg-white rounded-lg"
  [class.border-2]="interactive"
  [class.border-dashed]="interactive"
  [class.border-purple-200]="interactive"
>
  <!-- Grid background -->
  <div class="absolute inset-0 opacity-5 pointer-events-none"
       style="background-image: radial-gradient(circle, #6b7280 1px, transparent 1px); background-size: 20px 20px;">
  </div>

  @for (sticker of stickers; track sticker.instanceId) {
    <div
      class="absolute select-none"
      [class.ring-2]="interactive && selectedInstanceId() === sticker.instanceId"
      [class.ring-purple-400]="interactive && selectedInstanceId() === sticker.instanceId"
      [class.rounded-lg]="interactive && selectedInstanceId() === sticker.instanceId"
      [style.left.px]="sticker.x"
      [style.top.px]="sticker.y"
      [style.transform]="'rotate(' + sticker.rotation + 'deg) scale(' + sticker.scale + ')'"
      [style.z-index]="sticker.zIndex"
      [style.transform-origin]="'center center'"
      [attr.data-instance-id]="sticker.instanceId"
    >
      <img
        [src]="getStickerUrl(sticker.stickerId)"
        [alt]="sticker.stickerId"
        class="w-16 h-16 object-contain pointer-events-none"
        draggable="false"
      />
    </div>
  }

  @if (interactive && stickers.length === 0) {
    <div class="absolute inset-0 flex items-center justify-center text-stone-300 pointer-events-none">
      <div class="text-center">
        <div class="text-4xl mb-2">👆</div>
        <p class="text-sm">Tippe auf einen Sticker unten,<br/>um ihn aufs Canvas zu legen</p>
      </div>
    </div>
  }
</div>
