<div class="h-full relative">
  @switch (phase()) {
    @case ("LOBBY") {
      <app-board-lobby-scene
        [sessionCode]="sessionCode()"
        [playerQrDataUrl]="playerQrDataUrl()"
        [wifiQrDataUrl]="wifiQrDataUrl()"
      />
    }
    @case ("BUILDING") {
      <app-board-building-scene [modeState]="modeState()" />
    }
    @case ("VOTING") {
      <app-board-voting-scene [modeState]="modeState()" />
    }
    @case ("RESULTS") {
      <app-board-results-scene [modeState]="modeState()" />
    }
    @case ("NEXT_ROUND_SETUP") {
      <app-board-building-scene [modeState]="modeState()" />
    }
  }

  <!-- Persistent join info (bottom-right, hidden in LOBBY where it's already shown) -->
  @if (phase() !== 'LOBBY') {
    <div class="absolute bottom-3 right-3 flex items-end gap-2 bg-white/90 backdrop-blur rounded-2xl border border-black/6 shadow-lg px-3 py-2.5 z-10">
      @if (playerQrDataUrl()) {
        <img [src]="playerQrDataUrl()!" alt="Mitspielen QR"
             class="w-20 h-20 rounded-xl border border-black/6 bg-white p-0.5" />
      }
      <div class="text-center px-1">
        <div class="text-[10px] uppercase tracking-widest text-stone-400 font-semibold">Mitspielen</div>
        <div class="text-xl font-black tracking-[0.15em] text-stone-800 mt-0.5">{{ sessionCode() }}</div>
      </div>
      @if (wifiQrDataUrl()) {
        <img [src]="wifiQrDataUrl()!" alt="WLAN QR"
             class="w-20 h-20 rounded-xl border border-black/6 bg-white p-0.5" />
      }
    </div>
  }
</div>
