@if (editorOnly() || blankPaintActive()) {
  <app-sticker-creator-paint
    class="flex-1 min-h-0 flex flex-col"
    [stickers]="stickers()"
    [createStatus]="createStatus()"
    [initialStickerDataUrl]="editorOnly() ? initialStickerDataUrl() : null"
    [initialStickerName]="editorOnly() ? initialStickerName() : null"
    [editingStickerId]="editorOnly() ? editingStickerId() : null"
    [initialStickerEditorData]="editorOnly() ? initialStickerEditorData() : null"
    [initialPaintTool]="blankPaintActive() ? 'brush' : 'hand'"
    (createSticker)="createSticker.emit($event)"
    (stickerCreated)="onStickerCreated()"
    (canceled)="onPaintCanceled()"
  />
} @else if (sourceImageDataUrl(); as sourceDataUrl) {
  <app-sticker-creator-crop
    class="flex-1 min-h-0 flex flex-col"
    [imageDataUrl]="sourceDataUrl"
    (improveSticker)="forwardImproveSticker($event)"
    (canceled)="resetToStart()"
  />
} @else {
  <app-sticker-creator-start
    class="flex-1 min-h-0 flex flex-col pt-14"
    (imageSelected)="startImageCrop($event)"
    (blankSelected)="startBlankPaint()"
  />
}
