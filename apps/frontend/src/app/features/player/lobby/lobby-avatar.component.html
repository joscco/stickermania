<div class="h-full flex flex-col items-center justify-center p-4">
  <div class="text-center mb-3">
    <h2 class="text-lg font-bold">Zeichne deinen Avatar</h2>
    <p class="text-xs text-stone-500">{{ playerName() }}, mal dich selbst!</p>
  </div>
  <div class="relative overflow-hidden no-select"
       style="width: min(92vw, calc(100dvh - 260px)); aspect-ratio: 1;">
    <img src="assets/png/draw_frame.png" class="absolute inset-0 w-full h-full pointer-events-none z-0" alt="" />
    <canvas #canvas class="absolute inset-[11%] w-[78%] h-[78%] z-10" style="touch-action: none;"
            (pointerdown)="painter.pointerDown($event)"
            (pointermove)="painter.pointerMove($event)"
            (pointerup)="painter.pointerUp()"
            (pointercancel)="painter.pointerUp()"
    ></canvas>
  </div>
  <div class="flex items-center gap-3 mt-3">
    <button class="w-12 h-12 rounded-xl transition-transform"
            [class.scale-110]="brushThin() && !eraserMode()"
            (click)="selectBrush(true)">
      <img src="assets/png/draw_button_small.png" class="w-full h-full object-contain" alt="Dünn" />
    </button>
    <button class="w-12 h-12 rounded-xl transition-transform"
            [class.scale-110]="!brushThin() && !eraserMode()"
            (click)="selectBrush(false)">
      <img src="assets/png/draw_button_big.png" class="w-full h-full object-contain" alt="Dick" />
    </button>
    <button class="w-12 h-12 rounded-xl transition-transform"
            [class.scale-110]="eraserMode()"
            (click)="toggleEraser()">
      <img src="assets/png/draw_button_eraser.png" class="w-full h-full object-contain" alt="Radierer" />
    </button>
  </div>
  <div class="flex gap-2 mt-3 items-center">
    <button class="rounded-xl border border-black/10 bg-white px-4 py-2 text-sm hover:bg-stone-50" (click)="clear()">Löschen</button>
    <button class="h-12 transition-transform hover:scale-105 active:translate-y-px" (click)="submit()">
      <img src="assets/png/draw_button_ready.png" class="h-full object-contain" alt="Fertig" />
    </button>
  </div>
  <button class="mt-2 text-xs text-stone-400 hover:text-stone-600 underline" (click)="skipped.emit()">Überspringen</button>
</div>
