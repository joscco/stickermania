<div class="h-full flex flex-col">
  <div class="flex-1 flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
      <div class="text-center mb-6">
        <img src="assets/icons/cake.svg" class="w-12 h-12 mx-auto mb-2" alt=""/>
        <h1 class="text-xl font-bold">Willkommen!</h1>
        <p class="text-sm text-stone-500 mt-1">Gib deinen Namen ein, um mitzuspielen</p>
      </div>
      <div
        class="w-full rounded-2xl border border-black/[0.06] bg-white px-4 py-3 text-center text-lg min-h-[3rem] flex items-center justify-center"
      >
        <span>{{ nameInput() }}</span>
        <span class="animate-pulse text-stone-300 ml-0.5">|</span>
      </div>
      <button
        class="mt-3 w-full rounded-2xl bg-stone-900 text-white px-4 py-3 text-sm font-medium hover:bg-stone-800 active:translate-y-px disabled:opacity-40"
        [disabled]="nameInput().trim().length === 0"
        (click)="submit()"
      >
        Weiter →
      </button>
    </div>
  </div>

  <app-on-screen-keyboard
    [value]="nameInput()"
    [maxLength]="24"
    (valueChange)="nameInput.set($event)"
  />
</div>
