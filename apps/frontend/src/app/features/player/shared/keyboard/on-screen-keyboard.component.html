<div class="w-full bg-stone-100 border-t border-stone-200 px-1.5 pt-2"
     style="padding-bottom: max(0.375rem, env(safe-area-inset-bottom));">
  @for (row of currentRows(); track $index) {
    <div class="flex justify-center gap-1 mb-1">
      @for (key of row; track $index) {
        @if (key === '') {
          <div class="flex-1 h-12"></div>
        } @else if (key === 'SPACE') {
          <button
            class="flex-1 h-12 rounded-xl bg-white shadow-sm text-sm text-stone-400 font-medium active:bg-stone-300 transition-colors select-none"
            (touchstart)="onKey($event, key)" (mousedown)="onKey($event, key)"
          >Leer</button>
        } @else if (key === 'DEL') {
          <button
            class="flex items-center justify-center h-12 w-12 rounded-xl bg-stone-200 active:bg-stone-400 transition-colors select-none"
            (touchstart)="startDelete($event)" (mousedown)="startDelete($event)"
            (touchend)="stopDelete()" (touchcancel)="stopDelete()" (mouseup)="stopDelete()" (mouseleave)="stopDelete()"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"
                 class="w-6 h-6 text-stone-500">
              <path d="M9 2h9a3 3 0 0 1 3 3v14a3 3 0 0 1-3 3H9l-7-10z"/>
              <line x1="17" y1="8" x2="12" y2="16"/>
              <line x1="12" y1="8" x2="17" y2="16"/>
            </svg>
          </button>
        } @else if (key === '#123' || key === 'ABC') {
          <button
            class="flex items-center justify-center h-12 min-w-[3rem] px-3 rounded-xl bg-stone-200 text-xs font-bold text-stone-500 active:bg-stone-400 transition-colors select-none"
            (touchstart)="onKey($event, key)" (mousedown)="onKey($event, key)"
          >{{ key === '#123' ? '123' : 'ABC' }}</button>
        } @else if (key === 'SHIFT') {
          <button
            class="flex items-center justify-center h-12 w-12 rounded-xl active:bg-stone-400 transition-colors select-none"
            [class.bg-stone-300]="shifted()"
            [class.bg-stone-200]="!shifted()"
            (touchstart)="onKey($event, key)" (mousedown)="onKey($event, key)"
          >
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                 class="w-5 h-5"
                 [class.text-stone-800]="shifted()"
                 [class.text-stone-400]="!shifted()">
              <path d="M12 19V5"/>
              <polyline points="5 12 12 5 19 12"/>
            </svg>
          </button>
        } @else if (isLetter(key)) {
          <button
            class="flex items-center justify-center h-12 min-w-8 flex-1 rounded-xl bg-white shadow-sm text-lg font-medium text-stone-800 active:bg-stone-300 transition-colors select-none"
            (touchstart)="onKey($event, key)" (mousedown)="onKey($event, key)"
          >{{ key }}</button>
        } @else {
          <button
            class="flex items-center justify-center h-12 w-10 rounded-xl bg-white shadow-sm text-lg font-medium text-stone-800 active:bg-stone-300 transition-colors select-none"
            (touchstart)="onKey($event, key)" (mousedown)="onKey($event, key)"
          >{{ key }}</button>
        }
      }
    </div>
  }
</div>
