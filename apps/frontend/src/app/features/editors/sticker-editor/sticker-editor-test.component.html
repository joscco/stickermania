<div class="h-screen flex flex-col bg-stone-100">
  <!-- Header -->
  <div class="bg-linear-to-r from-purple-600 to-pink-500 text-white px-4 flex flex-row flex-nowrap items-center justify-between shrink-0">
    <div>
      <h1 class="text-lg font-bold">🧪 Sticker Editor Test</h1>
      <p class="text-xs opacity-80">Sticker auf den Canvas ziehen — Ghost folgt dem Finger</p>
    </div>
    <div class="flex items-center gap-2">
      <button
        class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full transition-colors"
        (click)="editor.clearPlacements()"
      >Canvas leeren</button>
    </div>
  </div>

  <!-- Editor (full catalog as palette, full screen) -->
  <app-sticker-editor
    #editor
    class="flex-1 min-h-0"
    [paletteStickers]="testCatalog()"
    [stickerCatalog]="testCatalog()"
    [maxStickers]="maxStickers"
  />

  <!-- Instructions footer -->
  <div class="bg-white border-t border-black/10 px-4 py-2 shrink-0">
    <div class="flex items-center justify-center gap-6 text-xs text-stone-400">
      <span>🖱️ Ziehen = Platzieren</span>
      <span>👆 Auswählen & Verschieben</span>
      <span>🤏 Pinch = Skalieren & Drehen</span>
      <span>⬆️⬇️ = Z-Index</span>
      <span>🗑️ = Löschen</span>
    </div>
  </div>
</div>
