<div class="h-screen flex flex-col bg-neutral-200">
  <!-- Header -->
  <div class="bg-neutral-700 text-white px-4 py-2 flex flex-row flex-nowrap items-center justify-between shrink-0">
      <h1 class="text-lg font-bold">Sticker Editor Test</h1>
    <div class="flex items-center gap-2">
      <button
        class="text-xs bg-white/20 hover:bg-white/30 px-3 py-1 rounded-full transition-colors"
        (click)="editor.clearPlacements()"
      >Canvas leeren</button>
    </div>
  </div>

  <!-- Editor (full catalog as palette, full screen) -->
  <app-sticker-editor
    #editor
    class="flex-1 min-h-0 max-w-full"
    [stickerCatalog]="testCatalog()"
    [stickerPacks]="testPacks()"
    [unlockedPackIds]="allPackIds()"
    [maxStickers]="maxStickers"
  />

  <app-sticker-editor-toolbar
    [placementCount]="editor.placements().length"
    [maxStickers]="maxStickers"
    [canAddMore]="editor.placements().length < maxStickers"
    [showPicker]="editor.showPicker()"
    (clearAll)="editor.clearPlacements()"
    (togglePicker)="editor.showPicker() ? editor.onPickerClose() : editor.showPicker.set(true)"
  />
</div>
