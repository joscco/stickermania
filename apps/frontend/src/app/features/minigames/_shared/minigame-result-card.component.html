<div class="w-full max-w-[320px] aspect-square bg-white rounded-2xl shadow-md border overflow-hidden flex flex-col"
     [class.border-yellow-400]="isWinner()"
     [class.ring-2]="isWinner()"
     [class.ring-yellow-400]="isWinner()"
     [class.border-neutral-200]="!isWinner()">
  @if (playerName()) {
    <div class="flex items-center gap-1.5 px-3 py-2 border-b border-neutral-100"
         [class.bg-yellow-50]="isWinner()">
      @if (isWinner()) { <span class="text-sm">★</span> }
      <span class="text-sm font-semibold truncate">{{ playerName() }}</span>
      @if (placement(); as p) {
        <span class="ml-auto text-xs text-neutral-400 font-medium">#{{ p }}</span>
      }
    </div>
  }
  <div class="flex-1 flex items-center justify-center p-3 min-h-0 overflow-hidden">
    @if (snapshotUrl(); as url) {
      <img [src]="url" alt="" class="max-w-full max-h-full object-contain rounded-lg"/>
    } @else {
      <div class="text-xs text-neutral-400 text-center px-2">{{ resultText() }}</div>
    }
  </div>
  <div class="px-3 py-2 border-t border-neutral-100">
    <div class="text-xs text-neutral-500 leading-relaxed text-center">{{ resultText() }}</div>
  </div>
</div>
