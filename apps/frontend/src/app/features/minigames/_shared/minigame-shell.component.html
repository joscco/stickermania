<div class="flex flex-col flex-1 min-h-0 gap-2 p-3 sm:p-4">
  <div class="text-center text-xs text-neutral-400 font-medium tracking-wide uppercase">
    Runde {{ roundIndex() }}
  </div>
  <div class="text-center text-sm font-semibold text-neutral-800">
    {{ taskTitle() }}
  </div>
  <div class="text-center text-xs text-neutral-500 leading-relaxed max-w-xs mx-auto">
    {{ description() }}
  </div>

  <div class="flex-1 flex items-center justify-center min-h-0 py-2">
    <div class="w-full max-w-[320px] aspect-square bg-white rounded-2xl shadow-md border border-neutral-200 overflow-hidden relative">
      <ng-content></ng-content>
    </div>
  </div>

  <div class="flex gap-3 pb-1">
    <button (click)="skipRound.emit()"
            class="flex-1 py-3 px-4 rounded-xl text-sm font-medium bg-neutral-100 text-neutral-600 active:bg-neutral-200 transition-colors select-none">
      Überspringen
    </button>
    <button (click)="submit.emit()"
            class="flex-1 py-3 px-4 rounded-xl text-sm font-semibold bg-black text-white active:bg-neutral-800 transition-colors select-none">
      Absenden
    </button>
  </div>
</div>
