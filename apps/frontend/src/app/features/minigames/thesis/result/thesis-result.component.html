<div class="flex flex-col h-full"
     [class.ring-2]="isWinner()" [class.ring-yellow-400]="isWinner()"
     [class.border-yellow-400]="isWinner()" [class.border-neutral-200]="!isWinner()">
  <div class="flex items-center gap-1.5 px-3 py-2 border-b shrink-0"
       [class.bg-yellow-50]="isWinner()" [class.border-neutral-100]="!isWinner()" [class.border-yellow-300]="isWinner()">
    @if (isWinner()) { <span>★</span> }
    <span class="text-sm font-semibold truncate flex-1">{{ playerName() }}</span>
    @if (placement(); as p) { <span class="text-xs text-neutral-400 font-medium">#{{ p }}</span> }
  </div>
  <div class="flex-1 flex flex-col items-center justify-center gap-4 p-4 min-h-0">
    <div class="px-5 py-2.5 rounded-xl text-lg font-bold"
         [class.bg-green-100]="submission().agreed"
         [class.text-green-800]="submission().agreed"
         [class.bg-red-100]="!submission().agreed"
         [class.text-red-800]="!submission().agreed">
      {{ submission().agreed ? '✓ Zustimmung' : '✗ Ablehnung' }}
    </div>
    <div class="text-center">
      <div class="text-4xl font-black text-neutral-900">{{ submission().estimatedPercent }}%</div>
      <div class="text-xs text-neutral-400 mt-1">deine Schätzung</div>
    </div>
    <div class="text-center">
      <div class="text-sm text-neutral-600">Tatsächlich: <span class="font-bold">{{ actualPercent() }}%</span></div>
      <div class="px-3 py-1 mt-1 rounded-full text-xs font-semibold"
           [class.bg-green-100]="deviation() < 10"
           [class.text-green-700]="deviation() < 10"
           [class.bg-neutral-100]="deviation() >= 10"
           [class.text-neutral-600]="deviation() >= 10">
        Δ {{ deviation() }}%
      </div>
    </div>
  </div>
  <div class="px-3 py-2 border-t border-neutral-100 shrink-0 text-center text-xs text-neutral-500">
    Wer die Zustimmung am besten schätzt, gewinnt
  </div>
</div>
