<div class="relative h-full w-full flex items-center justify-center">
  <app-scene-renderer
    class="block"
    [modeState]="modeState()"
    [containerWidthPx]="displayFieldWidth()"
    [containerHeightPx]="displayFieldHeight()"
    [imageSizePx]="imageSizeInPixel()"
    [logicalFieldWidth]="logicalFieldWidth()"
    [logicalFieldHeight]="logicalFieldHeight()"
  ></app-scene-renderer>

  @if (!modeState()) {
    <div class="absolute inset-0 grid place-items-center text-sm text-stone-400">Verbinde...</div>
  }

  @if (modeState() && drawingCount() === 0) {
    <div class="absolute inset-0 grid place-items-center z-20">
      <div class="text-center">
        <img src="assets/icons/paintbrush.svg" class="w-16 h-16 mx-auto mb-3 opacity-40" alt=""/>
        <div class="text-lg font-semibold text-stone-400">Das Museum wartet auf Kunst...</div>
        <div class="text-xs text-stone-300 mt-1">Scannt den QR-Code und stellt weitere Gemälde auf</div>
      </div>
    </div>
  }
</div>
