<div #walkTarget class="absolute pointer-events-none" style="will-change: transform;">
  <div #bobTarget [style.width.px]="sizePx()" [style.height.px]="sizePx()">
    <img
      [src]="spriteUrl()"
      class="w-full h-full"
      [style.transform]="facingLeft() ? 'scaleX(-1)' : ''"
      alt="" draggable="false"
    />
  </div>
</div>
