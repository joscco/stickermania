<div class="h-full flex flex-col">
  <div class="flex-1 flex flex-col items-center justify-center p-4 gap-3 overflow-auto">
    <!-- The drawing in a frame -->
    <div class="shrink-0">
      <app-framed-drawing
        [drawing]="{ id: task().drawingId, artistId: '', prompt: '', imageUrl: task().imageUrl, imageAssetPath: '', placedAt: 0 }"
        [sizePx]="300"
        [animateIn]="true"
      />
    </div>

    <div class="text-xs text-stone-400 text-center max-w-xs">
      Schreib einen lustigen Fake-Titel!
    </div>

    <!-- Rejection feedback -->
    @if (feedback(); as fb) {
      @if (fb.type === 'error') {
        <div class="text-xs text-red-500 font-medium text-center max-w-xs">
          {{ fb.text }}
        </div>
      }
    }

    <!-- Text display (no native input → no mobile keyboard) -->
    <div class="w-full max-w-xs">
      <div
        class="w-full rounded-xl border border-black/10 bg-white px-4 py-3 text-sm min-h-11 flex items-center"
      >
        <span class="whitespace-pre">{{ captionText() || '' }}</span>
        <span class="animate-pulse text-stone-300">|</span>
      </div>
    </div>

    <button
      class="rounded-xl bg-amber-500 text-white font-semibold px-6 py-3 text-sm disabled:opacity-40 transition-all active:scale-95"
      [disabled]="captionText().trim().length === 0 || isSubmitting()"
      (click)="submit()"
    >
      {{ isSubmitting() ? 'Wird geprüft…' : 'Absenden' }}
    </button>
  </div>

  <app-on-screen-keyboard
    [value]="captionText()"
    [maxLength]="80"
    (valueChange)="captionText.set($event)"
  />
</div>
