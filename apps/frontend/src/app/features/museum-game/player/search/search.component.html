<div class="h-full flex flex-col relative">
  <div class="text-center py-2 px-4 bg-blue-50 border-b border-blue-100">
    <div class="text-xs text-blue-500 uppercase tracking-wider">Finde auf der Karte:</div>
    @if (searchStore.currentTask(); as task) {
      <div class="text-lg font-bold text-blue-800 inline-flex items-center gap-1">
        <img src="assets/icons/search.svg" class="w-5 h-5 inline" alt="" /> {{ task.prompt }}
      </div>
    } @else {
      <div class="text-lg font-bold text-blue-800 inline-flex items-center gap-1">
        <img src="assets/icons/hourglass.svg" class="w-5 h-5 inline" alt="" /> Warten...
      </div>
      <div class="text-xs text-blue-500 mt-0.5">Du hast alles gefunden, oder es gibt gerade nichts mehr zu tun.</div>
    }
    @if (timeLeft()) {
      <div class="text-xs font-mono text-blue-500 mt-0.5 inline-flex items-center gap-1">
        <img src="assets/icons/timer.svg" class="w-3 h-3" alt="" /> {{ timeLeft() }}
      </div>
    }
  </div>

  <div
    class="flex-1 relative overflow-hidden"
    #viewport
    style="touch-action: none;"
    (pointerdown)="onPointerDown($event)"
    (pointermove)="onPointerMove($event)"
    (pointerup)="onPointerUp($event)"
    (pointercancel)="onPointerUp($event)"
    (wheel)="onWheel($event)"
  >
    <div class="absolute left-0 top-0 origin-top-left" style="touch-action: none;" [style.transform]="contentTransform()">
      <app-scene-renderer
        class="block"
        [modeState]="world.drawSearchModeState()"
        [containerWidthPx]="searchContainerSizePx()"
        [containerHeightPx]="sceneHeightPx()"
        [imageSizePx]="searchImageSizePx()"
        [logicalFieldWidth]="searchContainerSizePx()"
        [logicalFieldHeight]="sceneHeightPx()"
      ></app-scene-renderer>
    </div>

    <div class="absolute inset-0 pointer-events-none flex items-center justify-center">
      <div
        class="rounded-full border-2 border-blue-400/60"
        style="width: min(50vw, 50vh); height: min(50vw, 50vh); box-shadow: 0 0 0 9999px rgba(0,0,0,0.12);"
      >
        <div class="relative w-full h-full">
          <div class="absolute left-1/2 top-0 bottom-0 w-px bg-blue-400/40 -translate-x-1/2"></div>
          <div class="absolute top-1/2 left-0 right-0 h-px bg-blue-400/40 -translate-y-1/2"></div>
          <div class="absolute left-1/2 top-1/2 w-2 h-2 rounded-full bg-blue-500 -translate-x-1/2 -translate-y-1/2"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="absolute left-1/2 -translate-x-1/2 z-40" style="bottom: max(1.5rem, env(safe-area-inset-bottom))">
    <button
      class="w-16 h-16 rounded-full bg-white border-4 border-blue-500 shadow-xl grid place-items-center hover:bg-blue-50 active:scale-90 transition-transform"
      (click)="takeSnapshot()"
      [disabled]="!searchStore.currentTask()"
      [class.opacity-40]="!searchStore.currentTask()"
    >
      <img src="assets/png/art_icon_photo.png" class="w-8 h-8" alt="Foto" />
    </button>
  </div>

  @if (searchStore.feedback(); as feedback) {
    <div class="absolute inset-x-0 top-1/3 z-50 flex justify-center pointer-events-none">
      <div
        class="rounded-2xl px-6 py-4 text-lg font-bold shadow-xl animate-bounce"
        [class.bg-emerald-500]="feedback.correct"
        [class.bg-red-500]="!feedback.correct"
        [class.text-white]="true"
      >
        {{ feedback.text }}
      </div>
    </div>
  }
</div>
