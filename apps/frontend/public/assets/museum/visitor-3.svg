  <!-- Body -->
  <rect x="10" y="15" width="12" height="10" rx="3" fill="none" stroke="#222"/>
  <!-- Legs -->
  <line x1="13" y1="25" x2="12" y2="31"/>
  <line x1="19" y1="25" x2="20" y2="31"/>
  <!-- Arms -->
  <line x1="10" y1="19" x2="6" y2="22"/>
  <line x1="22" y1="19" x2="26" y2="22"/>
</svg>
