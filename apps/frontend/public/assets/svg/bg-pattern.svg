<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Small dots -->
  <circle cx="20" cy="20" r="1.5" fill="#d6d3d1"/>
  <circle cx="80" cy="20" r="1.5" fill="#d6d3d1"/>
  <circle cx="20" cy="80" r="1.5" fill="#d6d3d1"/>
  <circle cx="80" cy="80" r="1.5" fill="#d6d3d1"/>
  <circle cx="50" cy="50" r="1.5" fill="#d6d3d1"/>
  <!-- Plus/cross marks -->
  <g stroke="#e7e5e4" stroke-width="0.8" stroke-linecap="round" fill="none">
    <path d="M10 40 h10 M15 35 v10"/>
    <path d="M70 40 h10 M75 35 v10"/>
    <path d="M10 100 h10 M15 95 v10"/>
    <path d="M70 100 h10 M75 95 v10"/>
    <path d="M100 10 h10 M105 5 v10"/>
    <path d="M100 70 h10 M105 65 v10"/>
    <path d="M40 10 h10 M45 5 v10"/>
    <path d="M40 70 h10 M45 65 v10"/>
  </g>
  <!-- Light connecting lines -->
  <line x1="20" y1="20" x2="50" y2="50" stroke="#e7e5e4" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="20" x2="50" y2="50" stroke="#e7e5e4" stroke-width="0.5" opacity="0.5"/>
  <line x1="20" y1="80" x2="50" y2="50" stroke="#e7e5e4" stroke-width="0.5" opacity="0.5"/>
  <line x1="80" y1="80" x2="50" y2="50" stroke="#e7e5e4" stroke-width="0.5" opacity="0.5"/>
  <!-- Tiny stars -->
  <g transform="translate(105,105) scale(0.6)">
    <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#d6d3d1"/>
  </g>
  <g transform="translate(105,45) scale(0.6)">
    <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#d6d3d1"/>
  </g>
  <g transform="translate(45,105) scale(0.6)">
    <polygon points="0,-8 2,-2 8,0 2,2 0,8 -2,2 -8,0 -2,-2" fill="#d6d3d1"/>
  </g>
</svg>
